<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Trainer 🚀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #ff4757;
    --accent2: #ffa502;
    --green: #2ed573;
    --blue: #5352ed;
    --text: #f0f0f5;
    --muted: #7878a0;
    --card-radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .stats-bar { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .stats-bar b { color: var(--text); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    white-space: nowrap;
    transition: all .2s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* MAIN */
  main { padding: 20px; max-width: 600px; margin: 0 auto; }

  /* CATEGORY FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all .2s;
  }
  .filter-btn.on { border-color: var(--accent2); color: var(--accent2); }

  /* FLASHCARD */
  .card-wrap {
    perspective: 1200px;
    margin-bottom: 20px;
  }
  .card {
    width: 100%;
    height: 280px;
    border-radius: var(--card-radius);
    position: relative;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--card-radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 24px;
    text-align: center;
    border: 1px solid var(--border);
    overflow-y: auto;
  }
  .card-front { background: var(--surface); }
  .card-back { background: var(--surface2); transform: rotateY(180deg); }
  .card-hint { font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .card-word { font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--accent); }
  .card-transcription { font-size: 14px; color: var(--muted); margin-top: 8px; }
  .card-translation { font-size: 22px; font-weight: 700; color: var(--green); }
  .card-example { margin-top: 14px; padding: 12px 14px; background: rgba(0,0,0,.15); border-radius: 10px; border-left: 3px solid var(--blue); width: 100%; }
  .card-example-en { font-size: 13px; font-style: italic; color: var(--text); margin-bottom: 4px; }
  .card-example-uk { font-size: 12px; color: var(--muted); }
  .card-category { font-size: 11px; color: var(--muted); margin-top: 10px; background: var(--border); padding: 3px 10px; border-radius: 100px; }
  .card-tap-hint { font-size: 12px; color: var(--muted); margin-top: 12px; }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn-wrong { background: rgba(255,71,87,.15); color: var(--accent); }
  .btn-wrong:hover { background: rgba(255,71,87,.25); }
  .btn-right { background: rgba(46,213,115,.15); color: var(--green); }
  .btn-right:hover { background: rgba(46,213,115,.25); }
  .btn-skip { background: var(--surface2); color: var(--muted); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
  }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .3s; }

  /* QUIZ MODE */
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .quiz-opt {
    padding: 16px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
  }
  .quiz-opt:hover { border-color: var(--blue); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(46,213,115,.1); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--accent); background: rgba(255,71,87,.1); color: var(--accent); }

  /* WORD LIST */
  .word-list { display: flex; flex-direction: column; gap: 6px; }
  .word-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
  }
  .word-item .eng { font-weight: 700; flex: 1; }
  .word-item .trans { color: var(--accent); font-weight: 600; flex: 1; }
  .word-item .cat { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 100px; }
  .word-item .known-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .known { background: var(--green); }
  .unknown { background: var(--border); }

  /* SEARCH */
  .search-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* ADD WORD */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .add-form h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-input {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  select.form-input { cursor: pointer; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* RESULTS */
  .result-box {
    text-align: center;
    padding: 40px 20px;
  }
  .result-box .big { font-size: 60px; font-weight: 800; }
  .result-box .label { color: var(--muted); margin-top: 8px; font-size: 14px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .result-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .result-stat .val { font-size: 24px; font-weight: 800; }
  .result-stat .lbl { font-size: 12px; color: var(--muted); }
  .val-green { color: var(--green); }
  .val-red { color: var(--accent); }

  /* SECTION TITLE */
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .badge-a1 { background: rgba(83,82,237,.2); color: #7c7bff; }
  .badge-a2 { background: rgba(255,165,2,.15); color: var(--accent2); }
  .badge-b1 { background: rgba(46,213,115,.15); color: var(--green); }
  .badge-b2 { background: rgba(255,71,87,.15); color: var(--accent); }
  .badge-phrase { background: rgba(255,71,87,.15); color: var(--accent); }
  .badge-collocations { background: rgba(255,165,2,.15); color: var(--accent2); }
  .badge-discourse { background: rgba(83,82,237,.2); color: #7c7bff; }
  .badge-slang { background: rgba(46,213,115,.15); color: var(--green); }
  .badge-tired { background: rgba(120,120,160,.15); color: var(--muted); }
  .badge-pronouns { background: rgba(255,71,87,.1); color: #ff9090; }
  .badge-reactions { background: rgba(255,200,0,.15); color: #ffd000; }
  .badge-feelings { background: rgba(255,100,150,.15); color: #ff6496; }
  .badge-smalltalk { background: rgba(100,200,255,.15); color: #64c8ff; }
  .badge-phrasal { background: rgba(255,120,0,.15); color: #ff7800; }
  .badge-phone { background: rgba(80,200,120,.15); color: #50c878; }
  .badge-opinion { background: rgba(180,100,255,.15); color: #b464ff; }
  .badge-story { background: rgba(255,180,50,.15); color: #ffb432; }
  .badge-agree { background: rgba(50,180,200,.15); color: #32b4c8; }
  .badge-lesson { background: rgba(130,80,255,.2); color: #a066ff; }
  .badge-c1 { background: rgba(255,71,87,.2); color: #ff6b7a; }
  .badge-antonyms { background: rgba(255,150,50,.15); color: #ff9632; }
  .badge-function { background: rgba(140,140,180,.2); color: #c0c0e0; }
  .badge-quantity { background: rgba(70,190,210,.15); color: #46bed2; }
  .badge-questions { background: rgba(255,210,80,.15); color: #ffd250; }
  .badge-emotions2 { background: rgba(255,120,180,.15); color: #ff78b4; }
  .badge-timewords { background: rgba(100,220,140,.15); color: #64dc8c; }
  .badge-phrases2 { background: rgba(220,120,255,.15); color: #dc78ff; }
  .badge-family { background: rgba(80,200,120,.18); color: #50c878; }
  .badge-routines { background: rgba(80,150,255,.18); color: #5096ff; }
  .badge-verbs2 { background: rgba(255,170,60,.18); color: #ffaa3c; }

  /* TYPE-IN MODE */
  .type-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
  }
  .type-prompt-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .type-prompt { font-size: 26px; font-weight: 800; color: var(--green); }
  .type-prompt-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .type-input-wrap { margin-bottom: 14px; }
  .type-input {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--text);
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .type-input:focus { border-color: var(--blue); }
  .type-input.correct { border-color: var(--green); background: rgba(46,213,115,.08); }
  .type-input.incorrect { border-color: var(--accent); background: rgba(255,71,87,.08); }
  .type-feedback { text-align: center; font-size: 14px; margin-bottom: 14px; min-height: 20px; }
  .type-feedback.correct { color: var(--green); font-weight: 700; }
  .type-feedback.incorrect { color: var(--accent); font-weight: 700; }
  .type-answer-reveal { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* REVIEW / SRS */
  .review-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .review-stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; text-align: center; }
  .review-stat-box .num { font-size: 22px; font-weight: 800; }
  .review-stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .srs-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .srs-btn {
    padding: 12px 6px;
    border-radius: 10px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: transform .15s;
  }
  .srs-btn:active { transform: scale(.95); }
  .srs-again { background: rgba(255,71,87,.18); color: var(--accent); }
  .srs-hard { background: rgba(255,165,2,.18); color: var(--accent2); }
  .srs-good { background: rgba(83,82,237,.2); color: #8a89ff; }
  .srs-easy { background: rgba(46,213,115,.18); color: var(--green); }
  .srs-sub { font-size: 10px; opacity: .7; display: block; margin-top: 2px; }
</style>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCmkqkEAWWxMuFYvEkVjRUtdvlGl1OeQw",
    authDomain: "word-trainer-6be68.firebaseapp.com",
    projectId: "word-trainer-6be68",
    storageBucket: "word-trainer-6be68.firebasestorage.app",
    messagingSenderId: "109043560394",
    appId: "1:109043560394:web:7fedb7ff4ad01c67faa933"
  };

  const fbApp = initializeApp(firebaseConfig);
  const fbDb = getFirestore(fbApp);
  const fbAuth = getAuth(fbApp);
  const googleProvider = new GoogleAuthProvider();

  let currentUser = null;
  let authReady = false;

  // Обробляємо результат повернення з редіректу Google (якщо щойно увійшли)
  getRedirectResult(fbAuth).catch((e) => console.error('Redirect result error:', e));

  // Слухаємо зміну стану авторизації (автоматичний вхід якщо вже залогінений раніше)
  onAuthStateChanged(fbAuth, (user) => {
    currentUser = user;
    authReady = true;
    if (window.onAuthChange) window.onAuthChange(user);
  });

  window.firebaseAPI = {
    isReady() { return authReady; },
    getUser() { return currentUser; },
    async signIn() {
      try {
        // Redirect замість popup — стабільніше працює на iOS/Safari/мобільних
        await signInWithRedirect(fbAuth, googleProvider);
      } catch(e) {
        console.error('Sign-in error:', e);
      }
    },
    async signOutUser() {
      await signOut(fbAuth);
    },
    async getProgress() {
      if (!currentUser) return null;
      try {
        const ref = doc(fbDb, 'progress', currentUser.uid);
        const snap = await getDoc(ref);
        return snap.exists() ? snap.data() : null;
      } catch(e) {
        console.error('Firebase get error:', e);
        return null;
      }
    },
    async setProgress(data) {
      if (!currentUser) return false;
      try {
        const ref = doc(fbDb, 'progress', currentUser.uid);
        await setDoc(ref, data);
        return true;
      } catch(e) {
        console.error('Firebase set error:', e);
        return false;
      }
    }
  };
</script>
</head>

async function waitForFirebaseReady(maxWaitMs = 5000) {
  const start = Date.now();
  while ((!window.firebaseAPI || !window.firebaseAPI.isReady()) && Date.now() - start < maxWaitMs) {
    await new Promise(r => setTimeout(r, 50));
  }
}

// ============ CLOUD STORAGE (Firebase) ============
async function cloudLoad() {
  try {
    if (window.firebaseAPI) {
      const data = await window.firebaseAPI.getProgress();
      if (data) {
        if (data.known) knownSet = new Set(data.known);
        if (data.custom) customWords = data.custom;
        if (data.cats) activeCats = new Set(data.cats);
        if (data.srs) srsData = data.srs;
      }
      cloudSynced = true;
    }
  } catch(e) {
    cloudSynced = false;
  }
  // Завжди будуємо повний список слів
  words = [
    ...BASE_WORDS.map(w => ({...w, known: false, seen: 0, correct: 0})),
    ...customWords
  ];
}

let saveTimer = null;
async function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const knownArr = [...knownSet];
    // Хмарне збереження через Firebase (прив'язане до Google акаунта)
    if (window.firebaseAPI && cloudSynced) {
      const ok = await window.firebaseAPI.setProgress({
        known: knownArr,
        custom: customWords,
        cats: [...activeCats],
        srs: srsData,
        updatedAt: Date.now()
      });
      showSyncBadge(ok ? '✓ Збережено в хмарі' : '⚠ Помилка збереження');
    }
  }, 600);
}

function showSyncBadge(msg) {
  let badge = document.getElementById('sync-badge');
  if (!badge) return;
  badge.textContent = msg;
  badge.style.opacity = '1';
  setTimeout(() => { badge.style.opacity = '0'; }, 2000);
}

function renderFilters(container, standalone) {
  const div = document.createElement('div');
  div.className = 'filters';
  div.style.marginBottom = '14px';
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeCats.has(key) ? ' on' : '');
    btn.textContent = cat.label;
    btn.onclick = () => { 
      if (activeCats.has(key)) { if (activeCats.size > 1) activeCats.delete(key); }
      else activeCats.add(key);
      initFlash();
      render();
    };
    div.appendChild(btn);
  });
  if (standalone) { container.appendChild(div); }
  else { container.replaceWith ? container.replaceWith(div) : container.appendChild(div); }
}

function initFlash() {
  flashFlipped = false;
  const unk = getUnknown();
  // shuffle
  flashQueue = unk.map((_, i) => words.indexOf(unk[i]));
  for (let i = flashQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [flashQueue[i], flashQueue[j]] = [flashQueue[j], flashQueue[i]];
  }
  flashIndex = 0;
}

function flipCard() {
  flashFlipped = !flashFlipped;
  const card = document.getElementById('flash-card');
  if (card) card.classList.toggle('flipped', flashFlipped);
}

function markCard(known) {
  const idx = flashQueue[flashIndex];
  if (known) {
    knownSet.add(words[idx].e);
  }
  save();
  flashFlipped = false;
  flashIndex++;
  if (flashIndex >= flashQueue.length) {
    flashQueue = [];
    flashIndex = 0;
  }
  render();
}

function nextCard() {
  flashFlipped = false;
  flashIndex = (flashIndex + 1) % (flashQueue.length || 1);
  render();
}

// ============ SRS (SPACED REPETITION) ============
// Інтервали в днях для кожного рівня (0=новий, далі рівні зростання)
const SRS_INTERVALS = [0, 1, 3, 7, 16, 35, 75]; // днів до наступного повторення

function getSrsInfo(wordKey) {
  return srsData[wordKey] || { level: 0, nextReview: 0, lapses: 0 };
}

function srsAnswer(wordKey, grade) {
  // grade: 'again' | 'hard' | 'good' | 'easy'
  const info = getSrsInfo(wordKey);
  let newLevel = info.level;
  let lapses = info.lapses || 0;
  if (grade === 'again') {
    newLevel = 0;
    lapses++;
  } else if (grade === 'hard') {
    newLevel = Math.max(0, info.level - 1);
  } else if (grade === 'good') {
    newLevel = Math.min(SRS_INTERVALS.length - 1, info.level + 1);
  } else if (grade === 'easy') {
    newLevel = Math.min(SRS_INTERVALS.length - 1, info.level + 2);
  }
  const days = SRS_INTERVALS[newLevel];
  const nextReview = Date.now() + days * 24 * 60 * 60 * 1000;
  srsData[wordKey] = { level: newLevel, nextReview, lapses };
  // Якщо рівень досить високий — рахуємо слово як "відоме"
  if (newLevel >= 3) knownSet.add(wordKey);
  save();
}

function getDueWords() {
  const now = Date.now();
  return getFiltered().filter(w => {
    const info = getSrsInfo(w.e);
    return info.nextReview <= now;
  });
}

function getSrsStats() {
  const filtered = getFiltered();
  let newC = 0, learning = 0, mastered = 0, due = 0;
  const now = Date.now();
  filtered.forEach(w => {
    const info = getSrsInfo(w.e);
    if (info.level === 0 && !srsData[w.e]) newC++;
    else if (info.level >= 4) mastered++;
    else learning++;
    if (info.nextReview <= now) due++;
  });
  return { newC, learning, mastered, due, total: filtered.length };
}

function renderType(app) {
  const filtered = getFiltered();
  if (filtered.length < 1) {
    app.innerHTML = `<div class="empty"><div class="icon">😅</div><p>Немає слів в активних категоріях</p></div>`;

  }

  }

  if (ts.showResult) {
    app.innerHTML = `
      <div class="result-box">
        <div class="big ${ts.score > ts.words.length/2 ? 'val-green' : 'val-red'}">${ts.score}/${ts.words.length}</div>
        <div class="label">Правильно написано</div>

          <div class="result-stat"><div class="val val-green">${ts.score}</div><div class="lbl">✓ Правильно</div></div>
          <div class="result-stat"><div class="val val-red">${ts.words.length - ts.score}</div><div class="lbl">✗ Помилки</div></div>
        </div>
        <button class="btn-primary" onclick="typeState=null;render()">Ще раз</button>
      </div>
    `;
    return;
  }

  const w = ts.words[ts.current];
  const pct = Math.round(ts.current / ts.words.length * 100);
  const direction = ts.direction; // 'toEnglish' or 'toUkrainian'

  app.innerHTML = `
    <div class="progress-wrap" style="margin-bottom:18px">
      <div class="progress-label"><span>Слово ${ts.current+1} з ${ts.words.length}</span><span>Правильно: ${ts.score}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="type-card">
      <div class="type-prompt-label">${direction === 'toEnglish' ? 'Напиши англійською' : 'Напиши перекладом'}</div>
      <div class="type-prompt">${direction === 'toEnglish' ? w.t : w.e}</div>
      ${direction === 'toUkrainian' && w.tr ? `<div class="type-prompt-sub">[${w.tr}]</div>` : ''}
    </div>
    <div class="type-input-wrap">
      <input type="text" class="type-input" id="type-input" autocomplete="off" autocapitalize="off" placeholder="Введи відповідь..." onkeydown="if(event.key==='Enter')checkTypeAnswer()" />
    </div>
    <div class="type-feedback" id="type-feedback"></div>
    <div class="actions">
      <button class="btn btn-skip" onclick="skipTypeAnswer()">→ Пропустити</button>
      <button class="btn-primary" style="flex:1" onclick="checkTypeAnswer()">Перевірити</button>
    </div>
  `;
  setTimeout(() => { const inp = document.getElementById('type-input'); if (inp) inp.focus(); }, 50);
}

function startTypeSession(filtered) {
  const pool = [...filtered].sort(() => Math.random() - 0.5).slice(0, 15);
  typeState = {
    words: pool,
    current: 0,
    score: 0,
    done: false,
    showResult: false,
    direction: Math.random() > 0.5 ? 'toEnglish' : 'toUkrainian',
    answered: false
  };
  render();
}

function normalizeAnswer(s) {
  return s.toLowerCase().trim().replace(/['’‘]/g, "'").replace(/\s+/g, ' ');
}

function checkTypeAnswer() {
  const ts = typeState;
  if (ts.answered) { nextTypeWord(); return; }
  const input = document.getElementById('type-input');
  const userAns = normalizeAnswer(input.value);
  const w = ts.words[ts.current];
  const correctAns = ts.direction === 'toEnglish' ? w.e : w.t;
  // Дозволяємо часткове співпадіння для перекладу (бо може бути кілька варіантів через /)
  const correctVariants = normalizeAnswer(correctAns).split(/[\/,]/).map(s => s.trim());
  const isCorrect = correctVariants.some(v => v === userAns || (userAns.length > 2 && v.includes(userAns)));

  const feedback = document.getElementById('type-feedback');
  if (isCorrect) {
    input.classList.add('correct');
    feedback.className = 'type-feedback correct';
    feedback.textContent = '✓ Правильно!';
    ts.score++;
    srsAnswer(w.e, 'good');
  } else {
    input.classList.add('incorrect');
    feedback.className = 'type-feedback incorrect';
    feedback.innerHTML = `✗ Правильна відповідь: <b>${correctAns}</b>`;
    srsAnswer(w.e, 'again');
  }
  input.disabled = true;
  ts.answered = true;
  // Змінюємо кнопку Перевірити на "Далі"
  const btn = document.querySelector('.type-card').nextElementSibling.nextElementSibling.querySelector('.btn-primary');
  if (btn) btn.textContent = 'Далі →';
}

function nextTypeWord() {
  typeState.answered = false;
  typeState.current++;
  if (typeState.current >= typeState.words.length) {
    typeState.showResult = true;
  }
  render();
}

function skipTypeAnswer() {
  if (typeState.answered) { nextTypeWord(); return; }
  nextTypeWord();
}

// ---- REVIEW MODE (SRS Повторення) ----
function renderReview(app) {
  const stats = getSrsStats();
  if (!reviewState || reviewState.done) {
    const due = getDueWords();
    if (due.length === 0) {
      app.innerHTML = `
        <div class="review-stats">
          <div class="review-stat-box"><div class="num" style="color:var(--blue)">${stats.newC}</div><div class="lbl">Нові</div></div>
          <div class="review-stat-box"><div class="num" style="color:var(--accent2)">${stats.learning}</div><div class="lbl">Вчу</div></div>
          <div class="review-stat-box"><div class="num" style="color:var(--green)">${stats.mastered}</div><div class="lbl">Засвоєно</div></div>
        </div>
        <div class="result-box">
          <div class="big">🎉</div>
          <p style="font-size:18px;font-weight:800;margin-top:12px">На сьогодні все повторено!</p>
          <p class="label">Повертайся пізніше — нові слова з'являться за розкладом</p>
        </div>
      `;
      return;
    }
    startReviewSession(due);
    return;
  }

  const rs = reviewState;
  if (rs.showResult) {
    app.innerHTML = `
      <div class="result-box">
        <div class="big">✅</div>
        <p style="font-size:18px;font-weight:800;margin-top:12px">Повторено ${rs.words.length} слів!</p>
        <button class="btn-primary" onclick="reviewState=null;render()">Гаразд</button>
      </div>
    `;
    return;
  }

  const w = rs.words[rs.current];
  const pct = Math.round(rs.current / rs.words.length * 100);

  app.innerHTML = `
    <div class="progress-wrap" style="margin-bottom:18px">
      <div class="progress-label"><span>Повторення ${rs.current+1} з ${rs.words.length}</span><span>📅 На сьогодні</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card-wrap">
      <div class="card ${rs.flipped?'flipped':''}" id="review-card" onclick="flipReviewCard()">
        <div class="card-face card-front">
          <div class="card-hint">Англійське слово</div>
          <div class="card-word">${w.e}</div>
          ${w.tr ? `<div class="card-transcription">[${w.tr}]</div>` : ''}
          <div style="margin-top:14px">${badgeHtml(w.c)}</div>
          <div class="card-tap-hint">👆 Натисни, щоб згадати переклад</div>
        </div>
        <div class="card-face card-back">
          <div class="card-hint">Переклад</div>
          <div class="card-translation">${w.t}</div>
          ${w.ex ? `<div class="card-example"><div class="card-example-en">${w.ex}</div><div class="card-example-uk">${w.exT}</div></div>` : ''}
        </div>
      </div>
    </div>
    ${rs.flipped ? `
      <p style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px">Як добре ти пам'ятав це слово?</p>
      <div class="srs-buttons">
        <button class="srs-btn srs-again" onclick="answerReview('again')">Забув<span class="srs-sub">1д</span></button>
        <button class="srs-btn srs-hard" onclick="answerReview('hard')">Важко<span class="srs-sub">${SRS_INTERVALS[Math.max(0,getSrsInfo(w.e).level-1)]||1}д</span></button>
        <button class="srs-btn srs-good" onclick="answerReview('good')">Добре<span class="srs-sub">${SRS_INTERVALS[Math.min(SRS_INTERVALS.length-1,getSrsInfo(w.e).level+1)]}д</span></button>
        <button class="srs-btn srs-easy" onclick="answerReview('easy')">Легко<span class="srs-sub">${SRS_INTERVALS[Math.min(SRS_INTERVALS.length-1,getSrsInfo(w.e).level+2)]}д</span></button>
      </div>
    ` : `<p style="text-align:center;font-size:12px;color:var(--muted)">Спочатку згадай переклад, потім натисни картку</p>`}
  `;
}

function startReviewSession(due) {
  reviewState = {
    words: due.sort(() => Math.random() - 0.5),
    current: 0,
    flipped: false,
    done: false,
    showResult: false
  };
  render();
}

function flipReviewCard() {
  reviewState.flipped = !reviewState.flipped;
  render();
}

function answerReview(grade) {
  const rs = reviewState;
  const w = rs.words[rs.current];
  srsAnswer(w.e, grade);
  rs.flipped = false;
  rs.current++;
  if (rs.current >= rs.words.length) {
    rs.showResult = true;
  }
  render();
}


function renderQuiz(app) {
  if (!quizState || quizState.done) {
    const filtered = getFiltered();
    if (filtered.length < 4) {
      app.innerHTML = `<div class="empty"><div class="icon">😅</div><p>Потрібно хоча б 4 слова в активних категоріях</p></div>`;
      return;
    }
    if (!quizState || quizState.done) {
      startQuiz(filtered);
      return;
    }
  }

  const qs = quizState;
  const q = qs.questions[qs.current];
  const pct = Math.round(qs.current / qs.questions.length * 100);

  if (qs.showResult) {
    app.innerHTML = `
      <div class="result-box">
        <div class="big ${qs.score > qs.questions.length/2 ? 'val-green' : 'val-red'}">${qs.score}/${qs.questions.length}</div>
        <div class="label">Правильних відповідей</div>
        <div class="result-grid">
          <div class="result-stat"><div class="val val-green">${qs.score}</div><div class="lbl">✓ Правильно</div></div>
          <div class="result-stat"><div class="val val-red">${qs.questions.length - qs.score}</div><div class="lbl">✗ Помилки</div></div>
        </div>
        <button class="btn-primary" onclick="quizState=null;render()">Пройти ще раз</button>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="progress-wrap" style="margin-bottom:20px">
      <div class="progress-label"><span>Питання ${qs.current+1} з ${qs.questions.length}</span><span>Правильно: ${qs.score}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:20px">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Як перекласти?</div>
      <div style="font-size:28px;font-weight:800;color:var(--accent)">${q.word}</div>
      ${q.tr ? `<div style="font-size:13px;color:var(--muted);margin-top:6px">[${q.tr}]</div>` : ''}
    </div>
    <div class="quiz-options" id="quiz-opts">
      ${q.options.map((opt, i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${opt}</button>`).join('')}
    </div>
  `;
}

function startQuiz(filtered) {
  // shuffle & take up to 20
  const pool = [...filtered].sort(() => Math.random() - 0.5).slice(0, 20);
  const questions = pool.map(w => {
    const wrong = filtered.filter(x => x.e !== w.e).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [w.t, ...wrong.map(x => x.t)].sort(() => Math.random() - 0.5);
    return { word: w.e, tr: w.tr, correct: w.t, options };
  });
  quizState = { questions, current: 0, score: 0, done: false, showResult: false };
  render();
}

function answerQuiz(i) {
  const qs = quizState;
  const q = qs.questions[qs.current];
  const opts = document.querySelectorAll('.quiz-opt');
  const chosen = q.options[i];
  const isCorrect = chosen === q.correct;
  opts.forEach((btn, idx) => {
    if (q.options[idx] === q.correct) btn.classList.add('correct');
    else if (idx === i && !isCorrect) btn.classList.add('wrong');
    btn.disabled = true;
  });
  if (isCorrect) qs.score++;
  setTimeout(() => {
    qs.current++;
    if (qs.current >= qs.questions.length) qs.showResult = true;
    render();
  }, 900);
}

// ---- LIST ----
function renderList(app) {
  const q = searchQ.toLowerCase();
  const filtered = words.filter(w =>
    (activeCats.has(w.c)) &&
    (!q || w.e.toLowerCase().includes(q) || w.t.toLowerCase().includes(q))
  );
  const stats = getSrsStats();

  app.innerHTML = `
    <input class="search-input" placeholder="🔍 Пошук слова або перекладу..." value="${searchQ}" oninput="searchQ=this.value;render()" />
    <div id="list-filter"></div>
    <div class="progress-wrap" style="margin-bottom:14px">
      <div class="progress-label"><span>Засвоєно: <b style="color:var(--green)">${stats.mastered}</b> з ${stats.total}</span><span>Показано: ${filtered.length}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${stats.total ? stats.mastered/stats.total*100 : 0}%"></div></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn btn-skip" style="flex:none;padding:6px 14px;font-size:12px" onclick="if(confirm('Скинути весь прогрес?')){knownSet.clear();srsData={};save();render();}">Скинути прогрес</button>
    </div>
    <div class="word-list">
      ${filtered.length ? filtered.map(w => {
        const info = getSrsInfo(w.e);
        const levelColor = info.level === 0 ? 'var(--border)' : info.level < 3 ? 'var(--accent2)' : 'var(--green)';
        const levelLabel = info.level === 0 ? 'нове' : info.level < 3 ? `рівень ${info.level}` : 'засвоєно';
        return `
        <div class="word-item">
          <div class="known-dot" style="background:${levelColor}" title="${levelLabel}"></div>
          <div class="eng">${w.e}</div>
          <div class="trans">${w.t}</div>
          <div class="cat">${(CATEGORIES[w.c]||{label:w.c}).label}</div>
          <button style="background:none;border:none;cursor:pointer;font-size:16px;padding:0 4px" onclick="toggleKnown('${w.e.replace(/'/g,"\\'")}')">${info.level>=3?'★':'☆'}</button>
        </div>
      `;}).join('') : '<div class="empty"><div class="icon">🔍</div><p>Нічого не знайдено</p></div>'}
    </div>
  `;
  renderFilters(document.getElementById('list-filter'), false);
}

function toggleKnown(e) {
  if (knownSet.has(e)) knownSet.delete(e);
  else knownSet.add(e);
  save();
  render();
}

// ---- ADD ----
function renderAdd(app) {
  app.innerHTML = `
    <div class="add-form">
      <h3>☁️ Хмарна синхронізація</h3>
      <p style="font-size:13px;color:var(--muted)">Увійшла як <b style="color:var(--text)">${authUser ? (authUser.email || authUser.displayName) : '...'}</b>. Прогрес автоматично синхронізується з усіма пристроями, де ти заходиш у тренажер через цей самий Google акаунт.</p>
      <button class="btn btn-skip" style="margin-top:10px;padding:8px 16px;font-size:13px" onclick="handleSignOut()">Вийти з акаунта</button>
    </div>
    <div class="add-form">
      <h3>➕ Додати нове слово</h3>
      <div class="form-row">
        <input class="form-input" id="new-eng" placeholder="Англійське слово" />
        <input class="form-input" id="new-trans" placeholder="Переклад (укр)" />
      </div>
      <div class="form-row">
        <input class="form-input" id="new-tr" placeholder="Транскрипція (необов'язково)" />
        <select class="form-input" id="new-cat">
          ${Object.entries(CATEGORIES).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('')}
        </select>
      </div>
      <button class="btn-primary" onclick="addWord()">Додати слово</button>
    </div>
    <div class="section-title">Мої слова (${customWords.length})</div>
    <div class="word-list">
      ${customWords.length ? [...customWords].reverse().map(w => `
        <div class="word-item">
          <div class="known-dot ${knownSet.has(w.e)?'known':'unknown'}"></div>
          <div class="eng">${w.e}</div>
          <div class="trans">${w.t}</div>
          <div class="cat">${(CATEGORIES[w.c]||{label:w.c}).label}</div>
          <button style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--accent);padding:0 4px" onclick="deleteWord('${w.e.replace(/'/g,"\\'")}')">🗑</button>
        </div>
      `).join('') : '<p style="color:var(--muted);font-size:13px">Тут з\'являться слова, які ти додаси вручну</p>'}
    </div>
  `;
}

function addWord() {
  const e = document.getElementById('new-eng').value.trim();
  const t = document.getElementById('new-trans').value.trim();
  const tr = document.getElementById('new-tr').value.trim();
  const c = document.getElementById('new-cat').value;
  if (!e || !t) { alert('Введи слово та переклад!'); return; }
  if (words.find(w => w.e.toLowerCase() === e.toLowerCase())) { alert('Це слово вже є!'); return; }
  const newWord = { e, t, tr, c, known: false, seen: 0, correct: 0 };
  customWords.push(newWord);
  words.push(newWord);
  save();
  render();
}

function deleteWord(e) {
  customWords = customWords.filter(w => w.e !== e);
  words = words.filter(w => w.e !== e);
  knownSet.delete(e);
  save();
  render();
}

// ============ INIT ============
async function startAppAfterAuth() {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:16px">☁️</div>
      <p style="font-weight:600">Завантажую прогрес...</p>
    </div>`;
  await cloudLoad();
  initFlash();
  render();
}

async function init() {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:16px">🔌</div>
      <p style="font-weight:600">Підключення...</p>
    </div>`;
  await waitForFirebaseReady();

  if (!window.firebaseAPI) {
    // Firebase не завантажився (немережне середовище) — працюємо локально без хмари
    cloudSynced = false;
    await cloudLoad();
    initFlash();
    render();
    return;
  }

  const user = window.firebaseAPI.getUser();
  if (user) {
    authUser = user;
    await startAppAfterAuth();
  } else {
    renderLoginScreen(document.getElementById('app'));
  }

  // Реагуємо на майбутні зміни авторизації (наприклад вихід)
  window.onAuthChange = async (u) => {
    if (u && !authUser) {
      authUser = u;
      await startAppAfterAuth();
    } else if (!u && authUser) {
      authUser = null;
      renderLoginScreen(document.getElementById('app'));
    }
  };
}
init();
</script>
