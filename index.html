const GRAMMAR_QUIZZES = {
  '1a': { q: "Як правильно скоротити 'They are teachers'?", options: ["They're teachers","Their teachers","They's teachers"], correct: "They're teachers" },
  '1b': { q: "Обери правильне заперечення: 'She ___ from London.'", options: ["isn't","aren't","not is"], correct: "isn't" },
  '1c': { q: "'It's a school' чи 'Its a school'?", options: ["It's a school","Its a school"], correct: "It's a school" },
  '2a': { q: "Яка форма множини в слова 'a country'?", options: ["countrys","countries","countyes"], correct: "countries" },
  '2b': { q: "Обери правильний порядок слів:", options: ["It's a beautiful picture","It's a picture beautiful"], correct: "It's a beautiful picture" },
  '2c': { q: "Як буде заперечна пропозиція 'Let's stop'?", options: ["Let's not stop","Don't let's stop","Let's no stop"], correct: "Let's not stop" },
  '3a': { q: "Обери правильну форму: 'He ___ the guitar.' (➖)", options: ["doesn't play","don't play","not plays"], correct: "doesn't play" },
  '3b': { q: "'___ you live in New York?'", options: ["Do","Does","Are"], correct: "Do" },
  '3c': { q: "Обери правильний порядок: 'Where ___?'", options: ["does he live","he does live","does live he"], correct: "does he live" },
  '4a': { q: "Як правильно: машина батьків (множина)?", options: ["my parents' car","my parent's car","my parents's car"], correct: "my parents' car" },
  '4b': { q: "'He works ___ an office.'", options: ["in","at","to"], correct: "in" },
  '4c': { q: "Куди ставимо 'always' у реченні 'I ___ watch TV'?", options: ["I always watch TV","I watch always TV","Always I watch TV"], correct: "I always watch TV" },
  '5a': { q: "'___ you help me?' (прохання)", options: ["Can","Do","Are"], correct: "Can" },
  '5b': { q: "Яка форма Present Continuous від 'live'?", options: ["living","liveing","livving"], correct: "living" },
  '5c': { q: "'Look! It ___ now.'", options: ["'s snowing","snows","snow"], correct: "'s snowing" },
  'vocab-countries': { q: "Як правильно написати національність?", options: ["Spanish","spanish"], correct: "Spanish" },
};

let grammarQuizAnswers = {};

function renderGrammarQuiz(topicId) {
  const gq = GRAMMAR_QUIZZES[topicId];
  if (!gq) return '';
  const answered = grammarQuizAnswers[topicId];
  return `
    <div class="gquiz">
      <div class="gquiz-q">✏️ Перевір себе: ${gq.q}</div>
      <div class="gquiz-opts">
        ${gq.options.map(opt => {
          let cls = '';
          if (answered) {
            if (opt === gq.correct) cls = 'correct';
            else if (opt === answered && opt !== gq.correct) cls = 'wrong';
          }
          return `<button class="gquiz-opt ${cls}" ${answered ? 'disabled' : ''} onclick="answerGrammarQuiz('${topicId}', this)">${opt}</button>`;
        }).join('')}
      </div>
      ${answered ? `<div class="gquiz-result" style="color:${answered === gq.correct ? 'var(--green)' : 'var(--danger)'}">${answered === gq.correct ? '✓ Правильно!' : '✗ Правильна відповідь: ' + gq.correct}</div>` : ''}
    </div>
  `;
}

function answerGrammarQuiz(topicId, btnEl) {
  grammarQuizAnswers[topicId] = btnEl.textContent;
  render();
}

function toggleGrammar(id) {
  if (openGrammarTopics.has(id)) openGrammarTopics.delete(id);
  else openGrammarTopics.add(id);
  render();
}

const CHAPTER_LABELS = { 0: '📍 Словник', 1: 'Урок 1', 2: 'Урок 2', 3: 'Урок 3', 4: 'Урок 4', 5: 'Урок 5' };

function renderGrammar(app) {
  const q = grammarQ.toLowerCase().trim();
  const filtered = GRAMMAR_TOPICS.filter(t =>
    !q || t.title.toLowerCase().includes(q) || t.code.toLowerCase().includes(q) || t.html.toLowerCase().includes(q)
  );
  const chapters = [...new Set(filtered.map(t => t.chapter))].sort((a,b) => a-b);

  app.innerHTML = `
    <input class="search-input grammar-search" placeholder="🔍 Пошук правила (напр. 'can', 'present simple', 'прийменники')..." value="${grammarQ}" oninput="grammarQ=this.value;render()" />
    ${!filtered.length ? '<div class="empty"><div class="icon">📘</div><p>Нічого не знайдено</p></div>' : ''}
    ${chapters.map(ch => `
      <div class="grammar-chapter-title">${CHAPTER_LABELS[ch] || ch}</div>
      <div class="grammar-chapters">
        ${filtered.filter(t => t.chapter === ch).map(t => `
          <div class="grammar-card ${openGrammarTopics.has(t.id) ? 'open' : ''}">
            <div class="grammar-card-head" onclick="toggleGrammar('${t.id}')">
              <div class="grammar-card-title"><span class="code">${t.code}</span>${t.title}</div>
              <div class="grammar-card-arrow">▾</div>
            </div>
            <div class="grammar-card-body">${t.html}${renderGrammarQuiz(t.id)}</div>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `;
}


// ============ INIT ============
async function startAppAfterAuth() {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:16px">☁️</div>
      <p style="font-weight:600">Завантажую прогрес...</p>
    </div>`;
  await cloudLoad();
  initFlash();
  checkAchievements();
  render();
}

async function init() {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:16px">🔌</div>
      <p style="font-weight:600">Підключення...</p>
    </div>`;
  await waitForFirebaseReady();

  if (!window.firebaseAPI) {
    // Firebase не завантажився (немережне середовище) — працюємо локально без хмари
    cloudSynced = false;
    await cloudLoad();
    initFlash();
    render();
    return;
  }

  // Чекаємо завершення обробки редіректу від Google (якщо щойно повернулись)
  if (window.fbRedirectPromise) {
    try { await window.fbRedirectPromise; } catch(e) {}
  }

  const user = window.firebaseAPI.getUser();
  if (user) {
    authUser = user;
    await startAppAfterAuth();
  } else {
    renderLoginScreen(document.getElementById('app'));
  }

  // Реагуємо на майбутні зміни авторизації (наприклад вихід)
  window.onAuthChange = async (u) => {
    if (u && !authUser) {
      authUser = u;
      await startAppAfterAuth();
    } else if (!u && authUser) {
      authUser = null;
      renderLoginScreen(document.getElementById('app'));
    }
  };
}
init();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
