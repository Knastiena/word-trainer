<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Trainer 🚀</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2472">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WordTrainer">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap');

  :root {
    --bg: #F6F6F4;
    --surface: #ffffff;
    --surface2: #F1E9FA;
    --border: #E3DCEE;
    --accent: #1A2472;
    --accent2: #F0C383;
    --green: #5B8C6B;
    --blue: #2F5FA8;
    --danger: #C0524F;
    --text: #232A3D;
    --muted: #837C8C;
    --accent2-text: #9C6B1F;
    --gram-navy: #C0297A;
    --gram-sky: #F4E7FC;
    --gram-peach: #E7BEF8;
    --gram-cream: #FFFFFF;
    --card-radius: 16px;
    --sec-bg: #2F5FA8;
    --sec-fg: #ffffff;
    --sec-text: #2F5FA8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    box-shadow: 0 2px 10px rgba(75,53,53,.04);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px 12px;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .stats-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--muted); }
  .stats-bar b { color: var(--text); }

  /* SECTION HEADER (заголовок секції + кнопка Назад) */
  #section-header { padding: 0 20px; }
  .section-bar {
    width: fit-content;
    max-width: 100%;
    margin: 16px auto;
    padding: 12px 22px 12px 10px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 14px rgba(35,42,61,.1);
  }
  .back-btn {
    border: none;
    background: rgba(255,255,255,.55);
    color: inherit;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: rgba(255,255,255,.85); transform: translateX(-2px); }
  .section-bar-title { font-weight: 800; font-size: 15px; }

  /* MAIN */
  main { padding: 20px; max-width: 640px; margin: 0 auto; }

  /* CATEGORY FILTERS */
  .filters {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }
  .filter-btn {
    width: 100%;
    padding: 8px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all .2s;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .filter-btn.on { background: var(--sec-bg); border-color: var(--sec-bg); color: var(--sec-fg); }
  .filter-btn-action { border-style: dashed; font-weight: 700; color: var(--text); background: var(--surface); }
  .filter-btn-action:hover { border-color: var(--blue); color: var(--blue); }

  /* FLASHCARD */
  .card-wrap {
    perspective: 1200px;
    margin-bottom: 20px;
  }
  .card {
    width: 100%;
    height: 280px;
    border-radius: var(--card-radius);
    position: relative;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--card-radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 24px;
    text-align: center;
    border: 1px solid var(--border);
    overflow-y: auto;
    box-shadow: 0 6px 20px rgba(75,53,53,.08);
  }
  .card-front { background: var(--surface); }
  .card-back { background: var(--surface2); transform: rotateY(180deg); }
  .card-hint { font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .card-word { font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--sec-text); }
  .card-transcription { font-size: 14px; color: var(--muted); margin-top: 8px; }
  .card-translation { font-size: 22px; font-weight: 700; color: var(--green); }
  .card-example { margin-top: 14px; padding: 12px 14px; background: rgba(47,95,168,.10); border-radius: 10px; border-left: 3px solid var(--blue); width: 100%; }
  .card-example-en { font-size: 13px; font-style: italic; color: var(--text); margin-bottom: 4px; }
  .card-example-uk { font-size: 12px; color: var(--muted); }
  .card-category { font-size: 11px; color: var(--muted); margin-top: 10px; background: var(--border); padding: 3px 10px; border-radius: 100px; }
  .card-tap-hint { font-size: 12px; color: var(--muted); margin-top: 12px; }

  /* ACTIONS */
  .actions {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }
  .btn:active { transform: scale(.97); }
  .btn-wrong { background: rgba(192,82,79,.15); color: var(--danger); }
  .btn-wrong:hover { background: rgba(192,82,79,.25); }
  .btn-right { background: rgba(91,140,107,.15); color: var(--green); }
  .btn-right:hover { background: rgba(91,140,107,.25); }
  .btn-skip { background: var(--surface2); color: var(--muted); }
  .btn-primary {
    background: var(--sec-bg);
    color: var(--sec-fg);
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    box-shadow: 0 4px 14px rgba(35,42,61,.22);
    transition: all .15s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(35,42,61,.3); }
  .btn-primary:active { transform: scale(.98); }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 20px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--sec-text), var(--accent2)); border-radius: 4px; transition: width .3s; }

  /* QUIZ MODE */
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .quiz-opt {
    padding: 16px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
  }
  .quiz-opt:hover { border-color: var(--blue); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(75,53,53,.07); }
  .quiz-opt.correct { border-color: var(--green); background: rgba(91,140,107,.1); color: var(--green); }
  .quiz-opt.wrong { border-color: var(--danger); background: rgba(192,82,79,.1); color: var(--danger); }

  /* WORD LIST */
  .word-list { display: flex; flex-direction: column; gap: 6px; }
  .word-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
  }
  .word-item .eng { font-weight: 700; flex: 1; }
  .word-item .trans { color: var(--sec-text); font-weight: 600; flex: 1; }
  .word-item .cat { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 100px; }
  .word-item .known-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .known { background: var(--green); }
  .unknown { background: var(--border); }

  /* SEARCH */
  .search-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--sec-bg); }
  .search-input::placeholder { color: var(--muted); }

  /* ADD WORD */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 3px 12px rgba(75,53,53,.05);
  }
  .add-form h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-input {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .form-input:focus { border-color: var(--sec-bg); }
  .form-input::placeholder { color: var(--muted); }
  select.form-input { cursor: pointer; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* RESULTS */
  .result-box {
    text-align: center;
    padding: 40px 20px;
  }
  .result-box .big { font-size: 60px; font-weight: 800; }
  .result-box .label { color: var(--muted); margin-top: 8px; font-size: 14px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .result-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(75,53,53,.05); }
  .result-stat .val { font-size: 24px; font-weight: 800; }
  .result-stat .lbl { font-size: 12px; color: var(--muted); }
  .val-green { color: var(--green); }
  .val-red { color: var(--danger); }

  /* SECTION TITLE */
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .badge-a1 { background: rgba(47,95,168,.2); color: #2F5FA8; }
  .badge-a2 { background: rgba(240,195,131,.3); color: var(--accent2-text); }
  .badge-b1 { background: rgba(91,140,107,.15); color: var(--green); }
  .badge-b2 { background: rgba(26,36,114,.15); color: var(--accent); }
  .badge-phrase { background: rgba(26,36,114,.15); color: var(--accent); }
  .badge-collocations { background: rgba(240,195,131,.3); color: var(--accent2-text); }
  .badge-discourse { background: rgba(47,95,168,.2); color: #2F5FA8; }
  .badge-slang { background: rgba(91,140,107,.15); color: var(--green); }
  .badge-tired { background: rgba(120,120,160,.15); color: var(--muted); }
  .badge-pronouns { background: rgba(26,36,114,.1); color: #d9636a; }
  .badge-reactions { background: rgba(201,148,0,.15); color: #c79400; }
  .badge-feelings { background: rgba(217,69,122,.15); color: #d9457a; }
  .badge-smalltalk { background: rgba(47,147,207,.15); color: #2f93cf; }
  .badge-phrasal { background: rgba(204,99,0,.15); color: #cc6300; }
  .badge-phone { background: rgba(47,158,92,.15); color: #2f9e5c; }
  .badge-opinion { background: rgba(148,66,214,.15); color: #9442d6; }
  .badge-story { background: rgba(204,138,16,.15); color: #cc8a10; }
  .badge-agree { background: rgba(31,143,161,.15); color: #1f8fa1; }
  .badge-lesson { background: rgba(130,69,217,.2); color: #8245d9; }
  .badge-c1 { background: rgba(26,36,114,.2); color: #d44e5d; }
  .badge-antonyms { background: rgba(204,116,20,.15); color: #cc7414; }
  .badge-function { background: rgba(126,126,171,.2); color: #7e7eab; }
  .badge-quantity { background: rgba(31,150,168,.15); color: #1f96a8; }
  .badge-questions { background: rgba(201,154,16,.15); color: #c99a10; }
  .badge-emotions2 { background: rgba(217,82,142,.15); color: #d9528e; }
  .badge-timewords { background: rgba(42,168,99,.15); color: #2aa863; }
  .badge-phrases2 { background: rgba(179,71,224,.15); color: #b347e0; }
  .badge-family { background: rgba(47,158,92,.18); color: #2f9e5c; }
  .badge-routines { background: rgba(45,111,217,.18); color: #2d6fd9; }
  .badge-verbs2 { background: rgba(204,132,23,.18); color: #cc8417; }

  /* TYPE-IN MODE */
  .type-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: 0 6px 20px rgba(75,53,53,.06);
  }
  .type-prompt-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .type-prompt { font-size: 26px; font-weight: 800; color: var(--green); }
  .type-prompt-sub { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .type-input-wrap { margin-bottom: 14px; }
  .type-input {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--text);
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .type-input:focus { border-color: var(--blue); }
  .type-input.correct { border-color: var(--green); background: rgba(91,140,107,.08); }
  .type-input.incorrect { border-color: var(--danger); background: rgba(192,82,79,.08); }
  .type-feedback { text-align: center; font-size: 14px; margin-bottom: 14px; min-height: 20px; }
  .type-feedback.correct { color: var(--green); font-weight: 700; }
  .type-feedback.incorrect { color: var(--danger); font-weight: 700; }
  .type-answer-reveal { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* REVIEW / SRS */
  .review-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .review-stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; text-align: center; box-shadow: 0 2px 8px rgba(75,53,53,.05); }
  .review-stat-box .num { font-size: 22px; font-weight: 800; }
  .review-stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .srs-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .srs-btn {
    padding: 12px 6px;
    border-radius: 10px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: transform .15s;
  }
  .srs-btn:active { transform: scale(.95); }
  .srs-again { background: rgba(192,82,79,.18); color: var(--danger); }
  .srs-hard { background: rgba(240,195,131,.35); color: var(--accent2-text); }
  .srs-good { background: rgba(47,95,168,.2); color: #2F5FA8; }
  .srs-easy { background: rgba(91,140,107,.18); color: var(--green); }
  .srs-sub { font-size: 10px; opacity: .7; display: block; margin-top: 2px; }

  /* MATCH GAME */
  .match-item {
    padding: 14px 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    width: 100%;
  }
  .match-item:hover { border-color: var(--blue); }
  .match-item.selected { border-color: var(--blue); background: rgba(47,95,168,.12); }
  .match-item.matched { border-color: var(--green); background: rgba(91,140,107,.12); color: var(--green); opacity: .6; cursor: default; }
  .match-item.wrong { border-color: var(--danger); background: rgba(192,82,79,.15); color: var(--danger); animation: shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

  /* SENTENCE BUILDER */
  .build-prompt-uk { font-size: 16px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 4px; }
  .build-prompt-sub { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 18px; }
  .build-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 52px;
    padding: 10px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    align-content: flex-start;
  }
  .build-slot-empty { color: var(--muted); font-size: 13px; padding: 8px; }
  .build-tile {
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .build-tile:hover { border-color: var(--blue); }
  .build-tile.placed { background: rgba(47,95,168,.15); border-color: var(--blue); color: var(--blue); }
  .build-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 12px;
  }
  .build-feedback { text-align: center; font-size: 14px; font-weight: 700; min-height: 22px; margin-bottom: 10px; }
  .build-feedback.correct { color: var(--green); }
  .build-feedback.incorrect { color: var(--danger); }

  /* GRAMMAR SECTION */
  .grammar-chapters { display: flex; flex-direction: column; gap: 10px; }
  .grammar-chapter-title { font-size: 13px; font-weight: 800; color: var(--gram-navy); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 8px; }
  .grammar-card {
    background: var(--gram-cream);
    border: 1px solid var(--border);
    border-top: 3px solid var(--gram-peach);
    border-radius: var(--card-radius);
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(75,53,53,.05);
    transition: box-shadow .2s;
  }
  .grammar-card.open { border-top-color: var(--gram-navy); }
  .grammar-card:hover { box-shadow: 0 4px 16px rgba(75,53,53,.09); }
  .grammar-card-head:hover .grammar-card-title { color: var(--gram-navy); }
  .grammar-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    cursor: pointer;
    gap: 10px;
  }
  .grammar-card-title { font-size: 15px; font-weight: 700; }
  .grammar-card-title .code { color: #fff; background: var(--gram-navy); padding: 2px 9px; border-radius: 7px; margin-right: 8px; font-size: 13px; }
  .grammar-card-arrow { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .grammar-card.open .grammar-card-arrow { transform: rotate(180deg); }
  .grammar-card-body { display: none; padding: 4px 18px 20px; font-size: 14px; line-height: 1.6; overflow-wrap: break-word; word-break: break-word; max-width: 100%; }
  .grammar-card.open .grammar-card-body { display: block; }
  .grammar-card-body table { width: 100%; border-collapse: collapse; margin: 10px 0 14px; font-size: 13.5px; }
  .grammar-card-body th, .grammar-card-body td { border: 1px solid var(--border); padding: 7px 10px; text-align: left; overflow-wrap: break-word; word-break: break-word; }
  .grammar-card-body th { background: rgba(240,195,131,.4); font-weight: 700; color: var(--text); }
  .grammar-card-body .gex { color: var(--gram-navy); font-weight: 600; }
  .grammar-card-body .gex-uk { color: var(--green); font-weight: 600; }
  .grammar-card-body .gno { color: var(--danger); text-decoration: line-through; }
  .grammar-card-body ul { margin: 8px 0 8px 18px; }
  .grammar-card-body ol { margin: 8px 0 8px 20px; }
  .grammar-card-body ol > li { margin-bottom: 12px; }
  .grammar-card-body ol > li > ul { margin-top: 8px; }
  .grammar-card-body li { margin-bottom: 6px; }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCmkqkEAWWxMuFYvEkVjRUtdvlGl1OeQw",
    authDomain: "word-trainer-6be68.firebaseapp.com",
    projectId: "word-trainer-6be68",
    storageBucket: "word-trainer-6be68.firebasestorage.app",
    messagingSenderId: "109043560394",
    appId: "1:109043560394:web:7fedb7ff4ad01c67faa933"
  };

  const fbApp = initializeApp(firebaseConfig);
  const fbDb = getFirestore(fbApp);
  const fbAuth = getAuth(fbApp);
  const googleProvider = new GoogleAuthProvider();

  let currentUser = null;
  let authReady = false;
  window.fbAuthError = null;

  // Обробляємо результат повернення з редіректу Google (якщо щойно увійшли)
  // Зберігаємо проміс глобально, щоб init() міг його дочекатись перед рішенням показувати login чи ні
  window.fbRedirectPromise = getRedirectResult(fbAuth).then((result) => {
    if (result && result.user) {
      console.log('Redirect sign-in success:', result.user.email);
    }
    return result;
  }).catch((e) => {
    console.error('Redirect result error:', e.code, e.message);
    window.fbAuthError = e.code + ': ' + e.message;
    return null;
  });

  // Слухаємо зміну стану авторизації (автоматичний вхід якщо вже залогінений раніше)
  onAuthStateChanged(fbAuth, (user) => {
    currentUser = user;
    authReady = true;
    if (window.onAuthChange) window.onAuthChange(user);
  });

  window.firebaseAPI = {
    isReady() { return authReady; },
    getUser() { return currentUser; },
    getAuthError() { return window.fbAuthError; },
    async signIn() {
      try {
        // Popup — основний спосіб. Не залежить від сторонніх cookies між
        // доменом GitHub Pages і authDomain firebaseapp.com, тому не дає
        // "нескінченного циклу" верифікації, який трапляється з redirect.
        const result = await signInWithPopup(fbAuth, googleProvider);
        return result;
      } catch(e) {
        console.error('Popup sign-in error:', e.code, e.message);
        // Якщо браузер блокує popup (деякі мобільні/вбудовані браузери) —
        // переходимо на redirect як запасний варіант.
        if (e.code === 'auth/popup-blocked' || e.code === 'auth/operation-not-supported-in-this-environment' || e.code === 'auth/cancelled-popup-request') {
          try {
            await signInWithRedirect(fbAuth, googleProvider);
          } catch(e2) {
            console.error('Redirect sign-in error:', e2.code, e2.message);
            window.fbAuthError = e2.code + ': ' + e2.message;
          }
        } else if (e.code !== 'auth/popup-closed-by-user') {
          // Користувач сам закрив popup — це не помилка, нічого не показуємо.
          window.fbAuthError = e.code + ': ' + e.message;
        }
      }
    },
    async signOutUser() {
      await signOut(fbAuth);
    },
    async getProgress() {
      if (!currentUser) return null;
      try {
        const ref = doc(fbDb, 'progress', currentUser.uid);
        const snap = await getDoc(ref);
        return snap.exists() ? snap.data() : null;
      } catch(e) {
        console.error('Firebase get error:', e);
        return null;
      }
    },
    async setProgress(data) {
      if (!currentUser) return false;
      try {
        const ref = doc(fbDb, 'progress', currentUser.uid);
        await setDoc(ref, data);
        return true;
      } catch(e) {
        console.error('Firebase set error:', e);
        return false;
      }
    }
  };
</script>

async function waitForFirebaseReady(maxWaitMs = 5000) {
  const start = Date.now();
  while ((!window.firebaseAPI || !window.firebaseAPI.isReady()) && Date.now() - start < maxWaitMs) {
    await new Promise(r => setTimeout(r, 50));
  }
}

function renderLoginScreen(app) {
  const authError = window.firebaseAPI && window.firebaseAPI.getAuthError ? window.firebaseAPI.getAuthError() : null;
  app.innerHTML = `
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">📚</div>
      <p style="font-size:20px;font-weight:800;margin-bottom:10px">Увійди, щоб зберегти прогрес</p>

      <button class="btn-primary" style="max-width:280px;margin:0 auto" onclick="handleSignIn()">🔵 Увійти через Google</button>
      ${authError ? `<div style="margin-top:24px;padding:12px 16px;background:rgba(192,82,79,.1);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger);text-align:left;word-break:break-all">⚠️ Помилка: ${authError}</div>` : ''}

async function handleSignIn() {
  if (!window.firebaseAPI) return;
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:16px">🔄</div>

    </div>`;
  const result = await window.firebaseAPI.signIn();
  // Якщо це був popup-вхід і він завершився успішно — onAuthStateChanged
  // вже подбає про подальший рендер. Якщо ж користувач закрив вікно або
  // сталась помилка (і не пішли на redirect) — показуємо екран входу знову.
  if (!result && !window.firebaseAPI.getUser()) {
    renderLoginScreen(document.getElementById('app'));
  }

async function handleSignOut() {
  if (!window.firebaseAPI) return;
  await window.firebaseAPI.signOutUser();
  authUser = null;
  location.reload();
}

// ============ CLOUD STORAGE (Firebase) ============
async function cloudLoad() {
  try {
    if (window.firebaseAPI) {
      const data = await window.firebaseAPI.getProgress();
      if (data) {
        if (data.known) knownSet = new Set(data.known);
        if (data.custom) customWords = data.custom;
        if (data.cats) activeCats = new Set(data.cats);
        if (data.srs) srsData = data.srs;
        if (data.streak) streakData = data.streak;
        if (data.history) history = data.history;
        if (data.achievements) unlockedAchievements = data.achievements;
        if (data.dailyGoal) dailyGoal = data.dailyGoal;
        if (data.todayProgress) todayProgress = data.todayProgress;
        if (data.customCats) customCats = data.customCats;
      }
      cloudSynced = true;
    }
  } catch(e) {
    cloudSynced = false;
  }
  // Завжди будуємо повний список слів
  words = [
    ...BASE_WORDS.map(w => ({...w, known: false, seen: 0, correct: 0})),
    ...customWords
  ];
  touchStreak();
  logTodaySnapshot();
}

let saveTimer = null;
async function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const knownArr = [...knownSet];
    // Хмарне збереження через Firebase (прив'язане до Google акаунта)
    if (window.firebaseAPI && cloudSynced) {
      const ok = await window.firebaseAPI.setProgress({
        known: knownArr,
        custom: customWords,
        cats: [...activeCats],
        srs: srsData,
        streak: streakData,
        history: history,
        achievements: unlockedAchievements,
        dailyGoal: dailyGoal,
        todayProgress: todayProgress,
        customCats: customCats,
        updatedAt: Date.now()
      });
      showSyncBadge(ok ? '✓ Збережено в хмарі' : '⚠ Помилка збереження');
    }
  }, 600);
}

function showSyncBadge(msg) {

}

function renderFilters(container, standalone) {
  const div = document.createElement('div');
  div.className = 'filters';
  div.style.marginBottom = '14px';

  const clearBtn = document.createElement('button');
  clearBtn.className = 'filter-btn filter-btn-action';
  clearBtn.textContent = '✕ Зняти все';
  clearBtn.onclick = () => {
    activeCats.clear();
    initFlash();
    render();
  };
  div.appendChild(clearBtn);

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn filter-btn-action';
  allBtn.textContent = '☑ Обрати все';
  allBtn.onclick = () => {
    Object.keys(getAllCategories()).forEach(k => activeCats.add(k));
    initFlash();
    render();
  };
  div.appendChild(allBtn);

  Object.entries(getAllCategories()).forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeCats.has(key) ? ' on' : '');
    btn.textContent = cat.label;
    btn.onclick = () => { 
      if (activeCats.has(key)) activeCats.delete(key);
      else activeCats.add(key);
      initFlash();
      render();
    };
    div.appendChild(btn);
  });
  if (standalone) { container.appendChild(div); }
  else { container.replaceWith ? container.replaceWith(div) : container.appendChild(div); }
}

function initFlash() {
  flashFlipped = false;
  const unk = getUnknown();
  // shuffle
  flashQueue = unk.map((_, i) => words.indexOf(unk[i]));
  for (let i = flashQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [flashQueue[i], flashQueue[j]] = [flashQueue[j], flashQueue[i]];
  }
  flashIndex = 0;
}

function flipCard() {
  flashFlipped = !flashFlipped;
  const card = document.getElementById('flash-card');
  if (card) card.classList.toggle('flipped', flashFlipped);
}

// ============ SRS (SPACED REPETITION) ============
// Інтервали в днях для кожного рівня (0=новий, далі рівні зростання)
const SRS_INTERVALS = [0, 1, 3, 7, 16, 35, 75]; // днів до наступного повторення

function getSrsInfo(wordKey) {
  return srsData[wordKey] || { level: 0, nextReview: 0, lapses: 0 };
}

function srsAnswer(wordKey, grade) {
  // grade: 'again' | 'hard' | 'good' | 'easy'
  const info = getSrsInfo(wordKey);
  let newLevel = info.level;
  let lapses = info.lapses || 0;
  if (grade === 'again') {
    newLevel = 0;
    lapses++;
  } else if (grade === 'hard') {
    newLevel = Math.max(0, info.level - 1);
  } else if (grade === 'good') {
    newLevel = Math.min(SRS_INTERVALS.length - 1, info.level + 1);
  } else if (grade === 'easy') {
    newLevel = Math.min(SRS_INTERVALS.length - 1, info.level + 2);
  }
  const days = SRS_INTERVALS[newLevel];
  const nextReview = Date.now() + days * 24 * 60 * 60 * 1000;
  srsData[wordKey] = { level: newLevel, nextReview, lapses };
  // Якщо рівень досить високий — рахуємо слово як "відоме"
  if (newLevel >= 3) knownSet.add(wordKey);
  save();
}

function getDueWords() {
  const now = Date.now();
  return getFiltered().filter(w => {
    const info = getSrsInfo(w.e);
    return info.nextReview <= now;
  });
}

function getSrsStats() {
  const filtered = getFiltered();
  let newC = 0, learning = 0, mastered = 0, due = 0;
  const now = Date.now();
  filtered.forEach(w => {
    const info = getSrsInfo(w.e);
    if (info.level === 0 && !srsData[w.e]) newC++;
    else if (info.level >= 4) mastered++;
    else learning++;
    if (info.nextReview <= now) due++;
  });
  return { newC, learning, mastered, due, total: filtered.length };
}

function getTrickyWords(limit = 15) {
  return getFiltered()
    .map(w => ({ w, info: getSrsInfo(w.e) }))
    .filter(x => (x.info.lapses || 0) > 0)
    .sort((a, b) => (b.info.lapses || 0) - (a.info.lapses || 0))
    .slice(0, limit);
}

function startTrickyDrill() {
  const tricky = getTrickyWords(50).map(x => x.w);
  if (!tricky.length) return;
  startReviewSession(tricky);
}

// ============ STREAK / HISTORY / GOALS / ACHIEVEMENTS / TTS ============
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function dateMinusDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - n);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function touchStreak() {
  const today = todayStr();
  if (streakData.lastDate === today) return;
  const yesterday = dateMinusDays(today, 1);
  if (streakData.lastDate === yesterday) {
    streakData.count = (streakData.count || 0) + 1;
  } else {
    streakData.count = 1;
  }
  streakData.lastDate = today;
  if (todayProgress.date !== today) todayProgress = { date: today, count: 0 };
  save();
}

function bumpDailyProgress() {
  const today = todayStr();
  if (todayProgress.date !== today) todayProgress = { date: today, count: 0 };
  todayProgress.count++;
  checkAchievements();
  save();
}

function getGlobalMastered() {
  let m = 0;
  for (const w of words) { if (getSrsInfo(w.e).level >= 4) m++; }
  return m;
}

function logTodaySnapshot() {
  const today = todayStr();
  const mastered = getGlobalMastered();
  const existing = history.find(h => h.date === today);
  if (existing) existing.mastered = mastered;
  else history.push({ date: today, mastered });
  // тримаємо тільки останні 60 днів
  if (history.length > 60) history = history.slice(-60);
}

function getWeekHistory() {
  const today = todayStr();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = dateMinusDays(today, i);
    const entry = history.find(h => h.date === d);
    days.push({ date: d, mastered: entry ? entry.mastered : null });
  }
  // дельта = скільки засвоєно саме цього дня (різниця з попереднім записом)
  let prev = null;
  return days.map(d => {
    let delta = 0;
    if (d.mastered != null) {
      delta = prev != null ? Math.max(0, d.mastered - prev) : 0;
      prev = d.mastered;
    }
    return { date: d.date, delta };
  });
}

const ACHIEVEMENTS = [
  { id: 'first10', emoji: '🌱', label: '10 слів засвоєно', check: () => getGlobalMastered() >= 10 },

// ---- TTS (вимова слів) ----
function speak(text, lang) {
  try {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || 'en-US';
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
  } catch (e) { /* TTS недоступний — мовчки ігноруємо */ }
}

// ---- РОЗПІЗНАВАННЯ ВИМОВИ (мікрофон) ----
let recognitionActive = false;
function checkPronunciation(targetWord) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const fbEl = document.getElementById('mic-feedback');
  const micBtn = document.getElementById('mic-btn');
  if (!SR) {
    showToast('Розпізнавання голосу не підтримується цим браузером 😔', 'fail');
    if (fbEl) fbEl.textContent = 'Спробуй у Chrome';
    return;
  }
  if (recognitionActive) return;
  recognitionActive = true;
  if (fbEl) fbEl.textContent = '🎙 Слухаю...';
  if (micBtn) micBtn.style.opacity = '.5';
  try {
    const rec = new SR();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 3;
    let gotResult = false;
    rec.onresult = (e) => {
      gotResult = true;
      const said = (e.results[0][0].transcript || '').toLowerCase().trim().replace(/[.,!?]/g, '');
      const target = targetWord.toLowerCase().trim().replace(/[.,!?]/g, '');
      const isClose = said === target || said.includes(target) || target.includes(said);
      if (isClose) {
        showToast(randomFrom(PLAYFUL_WIN), 'win');
        if (fbEl) fbEl.innerHTML = `🎤 Почула: "<b style="color:var(--green)">${said}</b>" — супер!`;
      } else {
        showToast('Почула щось інше 🤔 Спробуй ще раз', 'fail');
        if (fbEl) fbEl.innerHTML = `🎤 Почула: "<b style="color:var(--danger)">${said}</b>" — не зовсім`;
      }
    };
    rec.onerror = () => {
      if (fbEl) fbEl.textContent = '⚠️ Не вдалось почути — перевір доступ до мікрофона';
    };
    rec.onend = () => {
      recognitionActive = false;
      if (micBtn) micBtn.style.opacity = '1';
      if (!gotResult && fbEl && fbEl.textContent === '🎙 Слухаю...') fbEl.textContent = 'Нічого не почула, спробуй ще раз';
    };
    rec.start();
  } catch (e) {
    recognitionActive = false;
    if (micBtn) micBtn.style.opacity = '1';
    if (fbEl) fbEl.textContent = '⚠️ Помилка мікрофона';
  }
}

function startTypeSession(filtered) {
  const pool = [...filtered].sort(() => Math.random() - 0.5).slice(0, 15);
  typeState = {
    words: pool,
    current: 0,
    score: 0,
    done: false,
    showResult: false,
    direction: Math.random() > 0.5 ? 'toEnglish' : 'toUkrainian',
    answered: false
  };
  render();
}

function normalizeAnswer(s) {
  return s.toLowerCase().trim().replace(/['’‘]/g, "'").replace(/\s+/g, ' ');
}

function checkTypeAnswer() {
  const ts = typeState;
  if (ts.answered) { nextTypeWord(); return; }
  const input = document.getElementById('type-input');
  const userAns = normalizeAnswer(input.value);
  const w = ts.words[ts.current];
  const correctAns = dictationMode ? w.e : (ts.direction === 'toEnglish' ? w.e : w.t);
  // Дозволяємо часткове співпадіння для перекладу (бо може бути кілька варіантів через /)
  const correctVariants = normalizeAnswer(correctAns).split(/[\/,]/).map(s => s.trim());
  const isCorrect = correctVariants.some(v => v === userAns || (userAns.length > 2 && v.includes(userAns)));

  const feedback = document.getElementById('type-feedback');
  if (isCorrect) {
    input.classList.add('correct');
    feedback.className = 'type-feedback correct';
    feedback.textContent = '✓ Правильно!';
    ts.score++;
    srsAnswer(w.e, 'good');
    showToast(randomFrom(PLAYFUL_WIN), 'win');
    bumpDailyProgress();
  } else {
    input.classList.add('incorrect');
    feedback.className = 'type-feedback incorrect';
    feedback.innerHTML = `✗ Правильна відповідь: <b>${correctAns}</b>`;
    srsAnswer(w.e, 'again');
    showToast(randomFrom(PLAYFUL_FAIL), 'fail');
  }
  input.disabled = true;
  ts.answered = true;
  // Змінюємо кнопку Перевірити на "Далі"
  const btn = document.querySelector('.type-card').nextElementSibling.nextElementSibling.querySelector('.btn-primary');
  if (btn) btn.textContent = 'Далі →';
}

function nextTypeWord() {
  typeState.answered = false;
  typeState.current++;
  if (typeState.current >= typeState.words.length) {
    typeState.showResult = true;
  }
  render();
}

function skipTypeAnswer() {
  if (typeState.answered) { nextTypeWord(); return; }
  nextTypeWord();
}

        <button class="srs-btn srs-hard" onclick="answerReview('hard')">Важко<span class="srs-sub">${SRS_INTERVALS[Math.max(0,getSrsInfo(w.e).level-1)]||1}д</span></button>
        <button class="srs-btn srs-good" onclick="answerReview('good')">Добре<span class="srs-sub">${SRS_INTERVALS[Math.min(SRS_INTERVALS.length-1,getSrsInfo(w.e).level+1)]}д</span></button>
        <button class="srs-btn srs-easy" onclick="answerReview('easy')">Легко<span class="srs-sub">${SRS_INTERVALS[Math.min(SRS_INTERVALS.length-1,getSrsInfo(w.e).level+2)]}д</span></button>
      </div>
    ` : `<p style="text-align:center;font-size:12px;color:var(--muted)">Спочатку згадай переклад, потім натисни картку</p>`}
  `;
}

function startReviewSession(due) {
  reviewState = {
    words: due.sort(() => Math.random() - 0.5),
    current: 0,
    flipped: false,
    done: false,
    showResult: false
  };
  render();
}

function flipReviewCard() {
  reviewState.flipped = !reviewState.flipped;
  render();
}

function answerReview(grade) {
  const rs = reviewState;
  const w = rs.words[rs.current];
  srsAnswer(w.e, grade);
  if (grade === 'again') showToast(randomFrom(PLAYFUL_FAIL), 'fail');
  else if (grade === 'easy') showToast(randomFrom(PLAYFUL_WIN), 'win');
  if (grade === 'good' || grade === 'easy') bumpDailyProgress();
  rs.flipped = false;
  rs.current++;
  if (rs.current >= rs.words.length) {
    rs.showResult = true;
  }
  render();
}


function renderQuiz(app) {
  if (!quizState || quizState.done) {
    const filtered = getFiltered();
    if (filtered.length < 4) {
      app.innerHTML = `<div class="empty"><div class="icon">😅</div><p>Потрібно хоча б 4 слова в активних категоріях</p></div>`;
      return;
    }
    if (!quizState || quizState.done) {
      startQuiz(filtered);
      return;
    }
  }

  const qs = quizState;
  const q = qs.questions[qs.current];
  const pct = Math.round(qs.current / qs.questions.length * 100);

  if (qs.showResult) {
    app.innerHTML = `
      <div class="result-box">
        <div class="big ${qs.score > qs.questions.length/2 ? 'val-green' : 'val-red'}">${qs.score}/${qs.questions.length}</div>
        <div class="label">Правильних відповідей</div>
        <div class="result-grid">
          <div class="result-stat"><div class="val val-green">${qs.score}</div><div class="lbl">✓ Правильно</div></div>
          <div class="result-stat"><div class="val val-red">${qs.questions.length - qs.score}</div><div class="lbl">✗ Помилки</div></div>
        </div>
        <button class="btn-primary" onclick="quizState=null;render()">Пройти ще раз</button>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="progress-wrap" style="margin-bottom:20px">
      <div class="progress-label"><span>Питання ${qs.current+1} з ${qs.questions.length}</span><span>Правильно: ${qs.score}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:20px">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Як перекласти?</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:10px">
        <div style="font-size:28px;font-weight:800;color:var(--sec-text)">${q.word}</div>
        <button onclick="speak('${q.word.replace(/'/g, "\\'")}')" style="background:none;border:none;cursor:pointer;font-size:22px">🔊</button>
      </div>
      ${q.tr ? `<div style="font-size:13px;color:var(--muted);margin-top:6px">[${q.tr}]</div>` : ''}
    </div>
    <div class="quiz-options" id="quiz-opts">
      ${q.options.map((opt, i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${opt}</button>`).join('')}
    </div>
  `;
}

function startQuiz(filtered) {
  // shuffle & take up to 20
  const pool = [...filtered].sort(() => Math.random() - 0.5).slice(0, 20);
  const questions = pool.map(w => {
    const wrong = filtered.filter(x => x.e !== w.e).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [w.t, ...wrong.map(x => x.t)].sort(() => Math.random() - 0.5);
    return { word: w.e, tr: w.tr, correct: w.t, options };
  });
  quizState = { questions, current: 0, score: 0, done: false, showResult: false };
  render();
}

function answerQuiz(i) {
  const qs = quizState;
  const q = qs.questions[qs.current];
  const opts = document.querySelectorAll('.quiz-opt');
  const chosen = q.options[i];
  const isCorrect = chosen === q.correct;
  opts.forEach((btn, idx) => {
    if (q.options[idx] === q.correct) btn.classList.add('correct');
    else if (idx === i && !isCorrect) btn.classList.add('wrong');
    btn.disabled = true;
  });
  if (isCorrect) {
    qs.score++;
    srsAnswer(q.word, 'good');
    showToast(randomFrom(PLAYFUL_WIN), 'win');
    bumpDailyProgress();
  } else {
    srsAnswer(q.word, 'again');
    showToast(randomFrom(PLAYFUL_FAIL), 'fail');
  }
  setTimeout(() => {
    qs.current++;
    if (qs.current >= qs.questions.length) qs.showResult = true;
    render();
  }, 900);
}

// ---- MATCH (Збіги) ----
function catsKey() { return [...activeCats].sort().join(','); }

function startMatch() {
  const filtered = getFiltered();
  const pool = [...filtered].sort(() => Math.random() - 0.5).slice(0, 8);
  const pairs = pool.map((w, i) => ({ id: i, e: w.e, t: w.t }));
  matchState = {
    catKey: catsKey(),
    pairs,
    leftOrder: [...pairs].sort(() => Math.random() - 0.5).map(p => p.id),
    rightOrder: [...pairs].sort(() => Math.random() - 0.5).map(p => p.id),
    selLeft: null, selRight: null, matched: new Set(), wrong: null
  };
  render();
}

function renderMatch(app) {
  const filtered = getFiltered();
  if (filtered.length < 2) {
    app.innerHTML = '<div id="list-filter-match"></div><div class="empty"><div class="icon">🃏</div><p>Обери більше категорій слів, щоб почати гру</p></div>';
    renderFilters(document.getElementById('list-filter-match'), false);
    return;
  }
  if (!matchState || matchState.catKey !== catsKey()) { startMatch(); return; }
  const ms = matchState;
  const done = ms.matched.size === ms.pairs.length;
  app.innerHTML = `
    <div id="list-filter-match"></div>
    ${done ? `
      <div class="result-box">
        <div class="big">✅</div>
        <p style="font-weight:800;font-size:18px;margin-top:8px">Усі пари знайдено!</p>
        <button class="btn-primary" onclick="startMatch()">Нова підбірка слів</button>
      </div>
    ` : `
      <p style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px">Натисни на слово зліва, потім на його переклад справа</p>
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <div style="display:flex;flex-direction:column;gap:8px;flex:1">
          ${ms.leftOrder.map(id => {
            const p = ms.pairs.find(x => x.id === id);
            const isMatched = ms.matched.has(id);
            const isSel = ms.selLeft === id;
            const isWrong = ms.wrong && ms.wrong.left === id;
            return `<button class="match-item ${isMatched ? 'matched' : ''} ${isSel ? 'selected' : ''} ${isWrong ? 'wrong' : ''}" ${isMatched ? 'disabled' : ''} onclick="pickMatch('left',${id})">${p.e}</button>`;
          }).join('')}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;flex:1">
          ${ms.rightOrder.map(id => {
            const p = ms.pairs.find(x => x.id === id);
            const isMatched = ms.matched.has(id);
            const isSel = ms.selRight === id;
            const isWrong = ms.wrong && ms.wrong.right === id;
            return `<button class="match-item ${isMatched ? 'matched' : ''} ${isSel ? 'selected' : ''} ${isWrong ? 'wrong' : ''}" ${isMatched ? 'disabled' : ''} onclick="pickMatch('right',${id})">${p.t}</button>`;
          }).join('')}
        </div>
      </div>
      <div style="text-align:center;color:var(--muted);font-size:13px">Знайдено пар: ${ms.matched.size} з ${ms.pairs.length}</div>
    `}
  `;
  renderFilters(document.getElementById('list-filter-match'), false);
}

function pickMatch(side, id) {
  const ms = matchState;
  if (!ms || ms.wrong) return;
  if (ms.matched.has(id)) return;
  if (side === 'left') ms.selLeft = (ms.selLeft === id ? null : id);
  else ms.selRight = (ms.selRight === id ? null : id);
  if (ms.selLeft != null && ms.selRight != null) {
    if (ms.selLeft === ms.selRight) {
      ms.matched.add(ms.selLeft);
      ms.selLeft = null; ms.selRight = null;
      render();
    } else {
      ms.wrong = { left: ms.selLeft, right: ms.selRight };
      render();
      setTimeout(() => {
        if (!matchState) return;
        matchState.wrong = null; matchState.selLeft = null; matchState.selRight = null;
        render();
      }, 700);
    }
  } else {
    render();
  }
}

// ---- SENTENCE BUILDER (Речення) ----
function getBuildPool() {
  return getFiltered().filter(w => w.ex);
}

function startBuild() {
  const pool = getBuildPool();
  if (!pool.length) { buildState = { catKey: catsKey(), empty: true }; render(); return; }
  const w = pool[Math.floor(Math.random() * pool.length)];
  // Розбиваємо приклад на слова, зберігаючи розділові знаки окремо в кінці токена
  const tokens = w.ex.trim().split(/\s+/);
  const tiles = tokens.map((tok, i) => ({ id: i, text: tok }));
  const shuffled = [...tiles].sort(() => Math.random() - 0.5);
  buildState = {
    catKey: catsKey(),
    word: w,
    correctOrder: tiles.map(t => t.id),
    tiles,
    bank: shuffled.map(t => t.id),   // id-и, що ще в "банку" (не розставлені)
    placed: [],                       // id-и в порядку розставлення
    result: null,                     // 'correct' | 'incorrect' | null
    empty: false
  };
  render();
}

function renderBuild(app) {
  if (!buildState || buildState.catKey !== catsKey()) { startBuild(); return; }
  const bs = buildState;
  if (bs.empty) {
    app.innerHTML = '<div id="list-filter-build"></div><div class="empty"><div class="icon">📝</div><p>У вибраних категоріях немає слів із прикладами речень.<br>Спробуй обрати інші категорії.</p></div>';
    renderFilters(document.getElementById('list-filter-build'), false);
    return;
  }
  app.innerHTML = `
    <div id="list-filter-build"></div>
    <div class="build-prompt-uk">${bs.word.exT || bs.word.t}</div>
    <div class="build-prompt-sub">Склади англійське речення зі слів нижче (слово: <b style="color:var(--sec-text)">${bs.word.e}</b>) <button onclick="speak('${(bs.word.ex||'').replace(/'/g, "\\'")}')" style="background:none;border:none;cursor:pointer;font-size:16px;vertical-align:middle">🔊</button></div>
    <div class="build-slots" id="build-slots">
      ${bs.placed.length ? bs.placed.map(id => {
        const t = bs.tiles.find(x => x.id === id);
        return `<button class="build-tile placed" onclick="unplaceTile(${id})">${t.text}</button>`;
      }).join('') : '<div class="build-slot-empty">Натискай на слова нижче, щоб додати їх сюди</div>'}
    </div>
    <div class="build-feedback ${bs.result || ''}">${bs.result === 'correct' ? '✓ Правильно!' : bs.result === 'incorrect' ? '✗ Спробуй ще раз' : ''}</div>
    <div class="build-bank">
      ${bs.bank.length ? bs.bank.map(id => {
        const t = bs.tiles.find(x => x.id === id);
        return `<button class="build-tile" onclick="placeTile(${id})">${t.text}</button>`;
      }).join('') : '<span style="color:var(--muted);font-size:13px">Усі слова розставлено</span>'}
    </div>
    <div class="actions">
      <button class="btn btn-skip" onclick="resetBuild()">↺ Спочатку</button>
      <button class="btn btn-skip" onclick="startBuild()">→ Інше речення</button>
      <button class="btn btn-right" onclick="checkBuild()">✓ Перевірити</button>
    </div>
  `;
  renderFilters(document.getElementById('list-filter-build'), false);
}

function placeTile(id) {
  const bs = buildState;
  bs.bank = bs.bank.filter(x => x !== id);
  bs.placed.push(id);
  bs.result = null;
  render();
}

function unplaceTile(id) {
  const bs = buildState;
  bs.placed = bs.placed.filter(x => x !== id);
  bs.bank.push(id);
  bs.result = null;
  render();
}

function resetBuild() {
  const bs = buildState;
  bs.bank = [...bs.bank, ...bs.placed].sort(() => Math.random() - 0.5);
  bs.placed = [];
  bs.result = null;
  render();
}

function checkBuild() {
  const bs = buildState;
  const isCorrect = bs.placed.length === bs.correctOrder.length &&
    bs.placed.every((id, i) => id === bs.correctOrder[i]);
  bs.result = isCorrect ? 'correct' : 'incorrect';
  render();
  if (isCorrect) {
    bumpDailyProgress();
    setTimeout(() => { if (buildState) startBuild(); }, 1400);
  }
}

    </div>
  `;
  renderFilters(document.getElementById('list-filter'), false);

function exportProgress() {
  const payload = {
    known: [...knownSet],
    custom: customWords,
    cats: [...activeCats],
    srs: srsData,
    streak: streakData,
    history: history,
    achievements: unlockedAchievements,
    dailyGoal: dailyGoal,
    todayProgress: todayProgress,
    customCats: customCats,
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wordtrainer-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('💾 Резервну копію збережено', 'win');
}

function importProgress(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('Імпортувати цей файл? Поточний прогрес на цьому пристрої буде замінено (але збережеться в хмарі під попередньою версією, доки не натиснеш будь-яку дію).')) return;
      if (data.known) knownSet = new Set(data.known);
      if (data.custom) customWords = data.custom;
      if (data.cats) activeCats = new Set(data.cats);
      if (data.srs) srsData = data.srs;
      if (data.streak) streakData = data.streak;
      if (data.history) history = data.history;
      if (data.achievements) unlockedAchievements = data.achievements;
      if (data.dailyGoal) dailyGoal = data.dailyGoal;
      if (data.todayProgress) todayProgress = data.todayProgress;
      if (data.customCats) customCats = data.customCats;
      words = [...BASE_WORDS.map(w => ({...w, known: false, seen: 0, correct: 0})), ...customWords];
      save();
      showToast('✅ Прогрес імпортовано', 'win');
      render();
    } catch (err) {
      alert('Не вдалося прочитати файл. Перевір, що це саме файл резервної копії з цього тренажера.');
    }
  };
  reader.readAsText(file);
}

function addWord() {
  const e = document.getElementById('new-eng').value.trim();
  const t = document.getElementById('new-trans').value.trim();
  const tr = document.getElementById('new-tr').value.trim();
  const c = document.getElementById('new-cat').value;
  if (!e || !t) { alert('Введи слово та переклад!'); return; }
  if (words.find(w => w.e.toLowerCase() === e.toLowerCase())) { alert('Це слово вже є!'); return; }
  const newWord = { e, t, tr, c, known: false, seen: 0, correct: 0 };
  customWords.push(newWord);
  words.push(newWord);
  save();
  render();
}

function deleteWord(e) {
  customWords = customWords.filter(w => w.e !== e);
  words = words.filter(w => w.e !== e);
  knownSet.delete(e);
  save();
  render();
}

function createCustomSet() {
  const emoji = document.getElementById('new-set-emoji').value.trim();
  const name = document.getElementById('new-set-name').value.trim();
  if (!name) { alert('Введи назву набору!'); return; }
  const key = 'set_' + name.toLowerCase().replace(/[^a-zа-яіїєґ0-9]+/gi, '_').replace(/^_+|_+$/g, '') + '_' + Date.now().toString(36).slice(-4);
  if (Object.keys(getAllCategories()).length >= 60) { alert('Забагато категорій, спробуй використати вже створені.'); return; }
  customCats[key] = { label: name, badge: 'badge-lesson', emoji };
  activeCats.add(key);
  save();
  showToast('📁 Набір "' + name + '" створено', 'win');
  render();
}

function deleteCustomSet(key) {
  if (!confirm('Видалити набір? Слова всередині нього (якщо є) залишаться, але без категорії доведеться призначити їх знову.')) return;
  delete customCats[key];
  activeCats.delete(key);
  save();
  render();
}

const GRAMMAR_TOPICS = [
{ id:'1a', chapter:1, code:'1A', title:'Дієслово be (➕), особові займенники', html:`
  <table><tr><th>Повна форма</th><th>Скорочення</th></tr>
  <tr><td>I am a student.</td><td>I'm a student.</td></tr>
  <tr><td>You are my partner.</td><td>You're my partner.</td></tr>
  <tr><td>He is Matt.</td><td>He's Matt.</td></tr>
  <tr><td>She is Sally.</td><td>She's Sally.</td></tr>
  <tr><td>It is a salsa class.</td><td>It's a salsa class.</td></tr>
  <tr><td>We are students.</td><td>We're students.</td></tr>
  <tr><td>You are partners.</td><td>You're partners.</td></tr>
  <tr><td>They are teachers.</td><td>They're teachers.</td></tr></table>
  <ul>
    <li>У скороченнях <b>'</b> замінює пропущену літеру: <span class="gex">'m</span> = am.</li>
    <li>Скорочення використовують в розмові та неформальному письмі (напр. лист другу).</li>
    <li>З дієсловом завжди вживаємо займенник: <span class="gex">It's a school.</span> <span class="gno">Is a school.</span></li>
    <li>Завжди пишемо <b>I</b> з великої літери. Інші займенники — з великої тільки на початку речення: <span class="gex">He's Ben and I'm Sally.</span> <span class="gno">i'm Sally.</span></li>
    <li><b>you</b> = і однина, і множина.</li>
    <li><b>he</b> — про чоловіка, <b>she</b> — про жінку, <b>it</b> — про річ.</li>
    <li><b>they</b> — про людей і речі (множина).</li>
  </ul>` },

{ id:'1b', chapter:1, code:'1B', title:'Дієслово be: заперечення (➖) і питання (❓)', html:`
  <div class="grammar-note">
    <b>I'm not American. She isn't from London. They aren't Spanish.</b><br>
    <b>'Are you Polish?'</b> 'Yes, I am.' &nbsp; <b>'Is she Russian?'</b> 'No, she isn't.'
  </div>
  <table><tr><th>Повна форма (➖)</th><th>Скорочення</th></tr>
  <tr><td>I am not</td><td>I'm not</td></tr>
  <tr><td>You are not</td><td>You aren't</td></tr>
  <tr><td>He / She / It is not</td><td>He / She / It isn't</td></tr>
  <tr><td>We are not</td><td>We aren't</td></tr>
  <tr><td>You are not</td><td>You aren't</td></tr>
  <tr><td>They are not</td><td>They aren't</td></tr></table>
  <table><tr><th>❓ Питання</th><th>✅ Коротка відповідь</th><th>❌ Коротка відповідь</th></tr>
  <tr><td>Am I... ? / Are you... ? / Is he/she/it... ? / Are we/you/they... ?</td><td>Yes, I am. / you are. / he is. / we are. / you are. / they are.</td><td>No, I'm not. / you aren't. / he isn't. / we aren't. / you aren't. / they aren't.</td></tr></table>
  <ul>
    <li>Щоб зробити заперечення (➖), додаємо <b>not</b> після be: <span class="gex">I'm not Italian.</span></li>
    <li><b>are not</b> та <b>is not</b> можна скоротити двома способами: <span class="gex">You're not Italian.</span> = <span class="gex">You aren't Italian.</span></li>
    <li>У питаннях <b>am, are, is</b> ставимо <u>перед</u> підметом (I, you, he...): <span class="gex">Are you Brazilian?</span> <span class="gno">You are Brazilian?</span></li>
    <li>У коротких позитивних відповідях <u>не</u> вживаємо скорочення: 'Are you Turkish?' <span class="gex">'Yes, I am.'</span> <span class="gno">'Yes, I'm.'</span></li>
  </ul>` },

{ id:'1c', chapter:1, code:'1C', title:"Присвійні прикметники (my, your, his...)", html:`
  <table><tr><th></th><th></th></tr>
  <tr><td>I'm Italian.</td><td><b>My</b> family are from Rome.</td></tr>
  <tr><td>You're in Class 1.</td><td>This is <b>your</b> classroom.</td></tr>
  <tr><td>He's the director.</td><td><b>His</b> name is Michael.</td></tr>
  <tr><td>She's your teacher.</td><td><b>Her</b> name is Tina.</td></tr>
  <tr><td>It's a language school.</td><td><b>Its</b> name is English House.</td></tr>
  <tr><td>We're an international school.</td><td><b>Our</b> students are from Europe and Asia.</td></tr>
  <tr><td>They're French students.</td><td><b>Their</b> names are Luc and Marie.</td></tr></table>
  <ul>
    <li>Присвійні прикметники вживаємо для людей і речей: <span class="gex">My family are from Italy. My car is German.</span></li>
    <li><b>his</b> = чоловіка, <b>her</b> = жінки, <b>its</b> = речі, <b>their</b> = людей або речей (множина).</li>
    <li>Присвійні прикметники <u>не</u> змінюються перед множиною: <span class="gex">our students</span> <span class="gno">ours students</span>.</li>
  </ul>
  <div class="grammar-note"><b>it's чи its?</b><br>
  <b>it's</b> = it is. <span class="gex">It's a school. It's Spanish.</span><br>
  <b>its</b> = присвійний займенник. <span class="gex">Its name is English House. Its flag is red and yellow.</span></div>` },

{ id:'2a', chapter:2, code:'2A', title:'Однина і множина іменників, a / an', html:`
  <table><tr><th>Однина</th><th>Множина</th></tr>
  <tr><td>It's a book.</td><td>They're books.</td></tr>
  <tr><td>It's a watch.</td><td>They're watches.</td></tr>
  <tr><td>It's a diary.</td><td>They're diaries.</td></tr>
  <tr><td>It's an umbrella.</td><td>They're umbrellas.</td></tr>
  <tr><td>It's an identity card.</td><td>They're identity cards.</td></tr></table>
  <ul>
    <li><b>a/an</b> вживаємо лише з іменниками в однині.</li>
    <li><b>an</b> — перед словом, що починається на голосний звук (a, e, i, o, u): <span class="gex">an umbrella</span>.</li>
    <li><b>a</b> — перед словами, що починаються на <b>u</b> або <b>eu</b>, якщо звук = /juː/: <span class="gex">a university, a euro</span>.</li>
    <li><b>a/an</b> не вживаємо з множиною: <span class="gex">They're books.</span> <span class="gno">They're a books.</span></li>
  </ul>
  <table><tr><th>Однина</th><th>Множина</th><th>Правило</th></tr>
  <tr><td>a book / a key</td><td>books / keys</td><td>+ -s</td></tr>
  <tr><td>a watch / a box</td><td>watches / boxes</td><td>+ -es після ch, sh, s, x</td></tr>
  <tr><td>a country / a dictionary</td><td>countries / dictionaries</td><td>приголосна + y → -ies</td></tr></table>
  <table><tr><th>Однина (неправильні)</th><th>Множина</th></tr>
  <tr><td>a man</td><td>men</td></tr>
  <tr><td>a woman</td><td>women</td></tr>
  <tr><td>a child</td><td>children</td></tr>
  <tr><td>a person</td><td>people</td></tr></table>
  <div class="grammar-note"><b>the</b><br>
  Вживаємо <b>the</b>, коли зрозуміло, про яку саме річ йдеться: <span class="gex">Look at the board.</span> <span class="gno">Look at a board.</span><br>
  <b>the</b> вживається і з одниною, і з множиною: <span class="gex">the board, the questions</span>.</div>` },

{ id:'2b', chapter:2, code:'2B', title:'Прикметники', html:`
  <ol>
    <li>Прикметник стоїть <u>перед</u> іменником: <span class="gex">It's a beautiful picture.</span> <span class="gno">It's a picture beautiful.</span>
      <ul><li>Якщо прикметник починається на голосний у фразі прикметник+іменник, вживаємо <b>an</b>: <span class="gno">It's a old house.</span> → <span class="gex">It's an old house.</span></li></ul>
    </li>
    <li>Прикметники <u>не</u> змінюються перед множиною: <span class="gex">They're blue jeans.</span> <span class="gno">They're blues jeans.</span></li>
    <li>Прикметник може стояти і після дієслова <b>be</b>. Порядок слів: <b>➕/➖</b>: підмет, be, прикметник; <b>❓</b>: be, підмет, прикметник.
      <ul>
        <li><span class="gex">My car's new. The computer isn't cheap.</span></li>
        <li><span class="gex">Is your car new? Is the computer cheap?</span></li>
      </ul>
    </li>
    <li>Часто вживаємо <b>very, really, quite</b> перед прикметниками: <span class="gex">He's very (or really) tall. He's quite tall. He isn't very tall.</span></li>
  </ol>` },

{ id:'2c', chapter:2, code:'2C', title:"Наказовий спосіб (imperatives), Let's", html:`
  <div class="grammar-note">
  <b>Open</b> the door. <b>Turn</b> right.<br>
  <b>Don't worry</b>. <b>Don't stop</b>.<br>
  <b>Be quiet</b>, please. Please <b>sit down</b>.<br>
  <b>Let's go</b> home. <b>Let's not stop</b>.
  </div>
  <ol>
    <li>Наказовий спосіб використовуємо, щоб сказати комусь зробити (або не робити) щось.
      <ul>
        <li>➕ наказ = дієслово (інфінітив без to).</li>
        <li>➖ наказ = <b>don't</b> + дієслово (інфінітив).</li>
        <li>Додаємо <b>please</b>, щоб бути вічливим: <span class="gex">Open the door, please.</span></li>
        <li>Часто вживаємо <b>be</b> + прикметник: <span class="gex">Be quiet., Be careful.</span></li>
        <li><u>Не</u> вживаємо займенник з наказом: <span class="gex">Be quiet.</span> <span class="gno">You be quiet.</span></li>
      </ul>
    </li>
    <li>Вживаємо <b>Let's</b> + дієслово (інфінітив), щоб запропонувати щось зробити. <b>Let's not</b> + дієслово — заперечна пропозиція.</li>
  </ol>
  <div class="grammar-note"><b>Can you...?</b><br>
  Вживаємо <b>Can you</b> + дієслово (інфінітив) як вічливу альтернативу наказу.<br>
  <span class="gex">Open the window.</span> → <span class="gex">Can you open the window, please?</span></div>` },

{ id:'3a', chapter:3, code:'3A', title:'Present Simple: ➕ і ➖', html:`
  <div class="grammar-note">
  <b>I speak</b> English. British people <b>like</b> gardens. My mother <b>cooks</b> fantastic food.<br>
  <b>I don't drink</b> tea. We <b>don't live</b> in a house with a garden. He <b>doesn't play</b> the guitar.
  </div>
  <table><tr><th>➕</th><th>➖</th></tr>
  <tr><td>I work.</td><td>I don't work.</td></tr>
  <tr><td>You work.</td><td>You don't work.</td></tr>
  <tr><td>He / She / It works.</td><td>He / She / It doesn't work.</td></tr>
  <tr><td>We work.</td><td>We don't work.</td></tr>
  <tr><td>You work.</td><td>You don't work.</td></tr>
  <tr><td>They work.</td><td>They don't work.</td></tr></table>
  <ul>
    <li>Present Simple вживаємо для речей, що завжди правдиві, або звичок.</li>
    <li>Скорочення: <b>don't</b> = do not, <b>doesn't</b> = does not.</li>
    <li>Заперечення = <b>don't/doesn't</b> + дієслово (інфінітив): <span class="gex">He doesn't work.</span> <span class="gno">He doesn't works.</span></li>
  </ul>
  <table><tr><th>he/she/it: правило написання</th><th>приклад</th></tr>
  <tr><td>звичайне дієслово</td><td>I work/play/live. → He works/plays/lives.</td></tr>
  <tr><td>закінчення -ch, -sh, -s, -x, -o → +es</td><td>I watch/finish/go/do. → She watches/finishes/goes/does.</td></tr>
  <tr><td>приголосна + y → -ies</td><td>I study. → She studies.</td></tr></table>
  <div class="grammar-note">Обережно з формами have і go: <b>I have</b> → <b>he has</b> /hæz/ <span class="gno">he haves</span>. <b>I do</b> → <b>he does</b> /dʌz/.</div>` },

{ id:'3b', chapter:3, code:'3B', title:'Present Simple: ❓ питання', html:`
  <div class="grammar-note">'<b>Do you live</b> in New York?' 'No, we <b>don't</b>.' &nbsp; '<b>Does he work</b> at night?' 'Yes, he <b>does</b>.'</div>
  <table><tr><th>❓</th><th>✅</th><th>❌</th></tr>
  <tr><td>Do I work?</td><td>Yes, I do.</td><td>No, I don't.</td></tr>
  <tr><td>Do you work?</td><td>Yes, you do.</td><td>No, you don't.</td></tr>
  <tr><td>Does he/she/it work?</td><td>Yes, he/she/it does.</td><td>No, he/she/it doesn't.</td></tr>
  <tr><td>Do we work?</td><td>Yes, we do.</td><td>No, we don't.</td></tr>
  <tr><td>Do you work?</td><td>Yes, you do.</td><td>No, you don't.</td></tr>
  <tr><td>Do they work?</td><td>Yes, they do.</td><td>No, they don't.</td></tr></table>
  <ul>
    <li>Вживаємо <b>do</b> (або <b>does</b> з he/she/it) + інфінітив, щоб утворити питання.</li>
    <li>Порядок слів у питаннях Present Simple: <b>ASI</b> = <b>A</b>uxiliary verb (do/does), <b>S</b>ubject (I, you, he...), <b>I</b>nfinitive (work, live...).</li>
  </ul>
  <div class="grammar-note"><b>do і does</b> вимова: do = /duː/, does = /dʌz/. Вони можуть бути:
  <ol><li>допоміжним дієсловом у питаннях: <span class="gex">Do you speak English? Does she live here?</span></li>
  <li>звичайним дієсловом: <span class="gex">I do my homework in the evening. He does exercise every day.</span></li></ol></div>` },

{ id:'3c', chapter:3, code:'3C', title:'Порядок слів у питаннях', html:`
  <table><tr><th colspan="3">Питання з be</th></tr>
  <tr><th>Питальне слово</th><th>be</th><th>...</th></tr>
  <tr><td>—</td><td>Is</td><td>she from Spain?</td></tr>
  <tr><td>—</td><td>Are</td><td>your friends here?</td></tr>
  <tr><td>What</td><td>'s</td><td>your dog's name?</td></tr>
  <tr><td>Where</td><td>'s</td><td>your office?</td></tr>
  <tr><td>How many students</td><td>are</td><td>in the class?</td></tr>
  <tr><td>How</td><td>are</td><td>you?</td></tr>
  <tr><td>How old</td><td>is</td><td>she?</td></tr></table>
  <table><tr><th colspan="4">Питання з іншими дієсловами</th></tr>
  <tr><th>Питальне слово</th><th>Auxiliary</th><th>Subject</th><th>Infinitive</th></tr>
  <tr><td>—</td><td>Do</td><td>you</td><td>live near here?</td></tr>
  <tr><td>What</td><td>does</td><td>your mother</td><td>know?</td></tr>
  <tr><td>Where</td><td>do</td><td>you</td><td>live?</td></tr>
  <tr><td>How many children</td><td>do</td><td>you</td><td>have?</td></tr>
  <tr><td>What kind of music</td><td>does</td><td>she</td><td>like?</td></tr>
  <tr><td>How</td><td>do</td><td>you</td><td>spell your surname?</td></tr></table>
  <ul>
    <li>У питаннях з <b>be</b> запам'ятай: <b>be</b> ставимо перед підметом.</li>
    <li>Порядок слів у Present Simple питаннях з do/does: <b>ASI</b> (Auxiliary, Subject, Infinitive) — <span class="gex">Do you live near here?</span>, або <b>QuASI</b> (Question, Auxiliary, Subject, Infinitive) — <span class="gex">Where does he live?</span></li>
    <li>Часто вживаємо питальні фрази, що починаються на <b>What</b>: <span class="gex">What colour...?, What time...?</span></li>
  </ul>` },

{ id:'4a', chapter:4, code:'4A', title:"Присвійний 's, Whose...?", html:`
  <div class="grammar-note">
  He's Brad Pitt<b>'s</b> brother. It's James<b>'s</b> laptop.<br>
  It's my parents<b>'</b> car.<br>
  '<b>Whose</b> is this bag?' 'It's Maria<b>'s</b>.'
  </div>
  <ol>
    <li>Вживаємо людина + <b>'s</b>, щоб говорити про сім'ю та власність: <span class="gex">He's Brad Pitt's brother.</span> <span class="gno">He's the brother of Brad Pitt.</span></li>
    <li>З правильною множиною ставимо <b>'</b> після s: <span class="gex">It's my parents' car.</span> <span class="gno">It's my parent's car.</span></li>
    <li>З неправильною множиною (children, men) вживаємо <b>'s</b>: <span class="gex">the children's room, men's clothes</span>.</li>
    <li>Вживаємо <b>Whose...?</b>, щоб запитати про власність: <span class="gex">Whose is this bag?</span> або <span class="gex">Whose bag is this?</span> Відповідь: <span class="gex">It's Maria's bag.</span> або <span class="gex">It's Maria's.</span></li>
    <li>Зазвичай <u>не</u> вживаємо річ + <b>'s</b>: <span class="gex">the end of the film</span> <span class="gno">the film's end</span>, <span class="gex">the city centre</span> <span class="gno">the city's centre</span>.</li>
  </ol>
  <div class="grammar-note"><b>'s</b> може означати дві різні речі: <b>Maria's mother</b> — 's = of Maria (належність); <b>Maria's Spanish</b> — 's = is.<br>
  <b>Whose</b> (про власність) і <b>Who's</b> (= Who is) вимовляються однаково /huːz/, але пишуться по-різному.</div>` },

{ id:'4b', chapter:4, code:'4B', title:'Прийменники часу і місця: in, on, at', html:`
  <table><tr><th>in</th><th>on</th><th>at</th></tr>
  <tr><td>the morning<br>the afternoon<br>the evening<br>the summer<br>December<br>2018</td>
      <td>Monday (morning)<br>1 January</td>
      <td>three o'clock<br>midday / midnight<br>lunchtime<br>night<br>the weekend<br>Christmas</td></tr></table>
  <ul>
    <li><b>in</b> — частини дня, сезони, місяці, роки.</li>
    <li><b>on</b> — дні і дати.</li>
    <li><b>at</b> — час дня, ніч, вихідні, свята.</li>
  </ul>
  <div class="grammar-note"><b>Місце і рух</b><br>
  <span class="gex">He has lunch at work. He works in an office. He goes to work at 8.00.</span>
  <ol>
    <li><b>at</b> і <b>in</b> — місце. <b>at</b> + work, home, school, university. <b>in</b> + інші місця (a flat, an office, a room). З деякими публічними місцями можна і <b>in</b>, і <b>at</b>: <span class="gex">a restaurant, the cinema</span>.</li>
    <li><b>to</b> — рух/напрямок: <span class="gex">She goes to the gym.</span> <span class="gno">She goes at the gym.</span> <b>to</b> не вживаємо перед <b>home</b>: <span class="gex">go home</span> <span class="gno">go to home</span>.</li>
  </ol></div>` },

{ id:'4c', chapter:4, code:'4C', title:'Прислівники частоти, позиція в речені', html:`
  <div class="grammar-note">
  I <b>always</b> watch TV in the evening. Do you <b>usually</b> sleep eight hours a day? She <b>sometimes</b> does sport. She doesn't <b>often</b> go to bed late.<br>
  They're <b>hardly ever</b> late. He isn't <b>often</b> stressed. Are you <b>usually</b> in this classroom?<br>
  I have English classes <b>twice a week</b>. She doesn't work <b>every day</b>.
  </div>
  <ol>
    <li>Прислівники й вирази частоти показують, як часто щось відбувається: 'How often do you cook?' 'I cook <b>every evening</b>.'
      <ul>
        <li>Прислівники частоти стоять <u>перед</u> основним дієсловом.</li>
        <li>У заперечних реченнях прислівник стоїть між don't/doesn't і дієсловом.</li>
      </ul>
    </li>
    <li>Прислівники частоти стоять <u>після</u> be в ➕ і ➖ реченнях. У ❓ з be прислівник стоїть після підмета.
      <ul><li>Вживаємо ➕ дієслово з <b>hardly ever</b> і <b>never</b>: <span class="gex">He's never stressed.</span> <span class="gno">He isn't never stressed.</span></li></ul>
    </li>
    <li>Вирази частоти зазвичай стоять в кінці речення або фрази дієслова.</li>
  </ol>` },

{ id:'5a', chapter:5, code:'5A', title:"can / can't", html:`
  <div class="grammar-note">
  I <b>can</b> sing, but I <b>can't</b> dance.<br>
  I <b>can</b> come on Tuesday, but I <b>can't</b> come on Wednesday.<br>
  You <b>can</b> park here. You <b>can't</b> park there.<br>
  <b>Can you</b> help me? <b>Can I</b> open the window?
  </div>
  <table><tr><th>➕</th><th>➖</th></tr>
  <tr><td>I/You/He/She/It/We/They <b>can</b> swim/come/help.</td><td>I/You/He/She/It/We/They <b>can't</b> swim/come/help.</td></tr></table>
  <table><tr><th>❓</th><th>✅</th><th>❌</th></tr>
  <tr><td>Can I/you/he/she/it/we/they swim/come/help?</td><td>Yes, I/you/he/... can.</td><td>No, I/you/he/... can't.</td></tr></table>
  <ol>
    <li><b>can</b> + інфінітив має різні значення:
      <ul>
        <li><b>Здатність:</b> <span class="gex">I can (sing) = я вмію.</span> <span class="gex">I can't (dance) = я не вмію.</span></li>
        <li><b>Можливість:</b> <span class="gex">I can (come) = мені можливо прийти.</span> <span class="gex">I can't (come) = мені неможливо прийти.</span></li>
        <li><b>Дозвіл:</b> <span class="gex">You can (park here) = це дозволено.</span> <span class="gex">You can't (park here) = це не дозволено.</span></li>
        <li><b>Прохання:</b> <span class="gex">Can you (help me)? = Будь ласка, зроби це.</span> <span class="gex">Can I (open the window)? = Чи це ОК, якщо я це зроблю?</span></li>
      </ul>
    </li>
  </ol>
  <ul>
    <li><b>can</b> і <b>can't</b> однакові для всіх осіб (I, you, he...). <span class="gno">He cans.</span></li>
    <li>Скорочення: <b>can't</b> = cannot.</li>
    <li>Після <b>can</b> <u>не</u> вживаємо <b>to</b>: <span class="gex">I can swim.</span> <span class="gno">I can to swim.</span></li>
  </ul>` },

{ id:'5b', chapter:5, code:'5B', title:'Present Continuous', html:`
  <div class="grammar-note">
  <b>They're having</b> a party next door.<br>
  Oh no! <b>The baby's crying.</b><br>
  <b>It's raining.</b><br>
  A: <b>What are you doing?</b> &nbsp; B: <b>I'm waiting</b> for my brother.
  </div>
  <table><tr><th>➕</th><th>➖</th></tr>
  <tr><td>I'm / You're / He's-She's-It's / We're / They're <b>having party</b>.</td><td>I'm not / You aren't / He/She/It isn't / We aren't / They aren't <b>having party</b>.</td></tr></table>
  <table><tr><th>❓</th><th>✅</th><th>❌</th></tr>
  <tr><td>Am I / Are you / Is he-she-it / Are we / Are they <b>having a party</b>?</td><td>Yes, I am. / you are. / he is. / we are. / they are.</td><td>No, I'm not. / you aren't. / he isn't. / we aren't. / they aren't.</td></tr></table>
  <ul>
    <li>Present Continuous вживаємо для дій, що відбуваються зараз / в момент мовлення.</li>
    <li><b>At the moment</b> може означати "приблизно зараз": <span class="gex">I'm reading a good book at the moment.</span> (= не саме цієї секунди).</li>
    <li>Також вживаємо Present Continuous з тривалішими періодами: <b>today, this week, this month</b>. Це підкреслює, що дія <u>тимчасова</u>, а не звичка: <span class="gex">I'm working at home this week because my daughter isn't very well.</span></li>
  </ul>
  <table><tr><th>infinitive</th><th>verb + -ing</th><th>правило написання</th></tr>
  <tr><td>cook, read</td><td>cooking, reading</td><td>+ -ing</td></tr>
  <tr><td>study, try</td><td>studying, trying</td><td>+ -ing</td></tr>
  <tr><td>dance, live</td><td>dancing, living</td><td>-e → -ing</td></tr>
  <tr><td>shop, swim</td><td>shopping, swimming</td><td>1 голосна + 1 приголосна → подвоюємо приголосну + -ing</td></tr></table>` },

{ id:'5c', chapter:5, code:'5C', title:'Present Simple чи Present Continuous?', html:`
  <table><tr><th>Present Simple</th><th>Present Continuous</th></tr>
  <tr><td>It always <b>snows</b> here in winter.</td><td>Look! It's <b>snowing</b>.</td></tr>
  <tr><td>What do you usually <b>do</b> at work?</td><td>What are you <b>doing</b> now?</td></tr>
  <tr><td>My sister <b>works</b> in a bank.</td><td>Today she's <b>working</b> at home.</td></tr></table>
  <ul>
    <li>Вживаємо <b>Present Simple</b>, щоб сказати, що ми <u>зазвичай</u> робимо, або що завжди правдиво.</li>
    <li>Часто вживаємо Present Simple з прислівниками й виразами частоти: <b>always, often, once a week</b> тощо.</li>
    <li>Вживаємо <b>Present Continuous</b>, щоб сказати, що відбувається <u>зараз</u> або приблизно зараз.</li>
    <li>Часто вживаємо Present Continuous з <b>at the moment, today, this week</b>.</li>
  </ul>
  <div class="grammar-note"><b>What do you do?</b> чи <b>What are you doing?</b><br>
  A: <b>What do you do?</b> (= Яка твоя робота?) &nbsp; B: I'm a teacher.<br>
  A: <b>What are you doing?</b> (= зараз, у цю мить) &nbsp; B: I'm waiting for a friend.</div>` },
